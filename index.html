<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Magazine - Bug Free Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');
        
        body { font-family: 'Lato', sans-serif; margin: 0; overflow: hidden; transition: background-color 0.3s, color 0.3s; }
        .bg-light { background-color: #f8f9fa; color: #1a1a1a; }
        
        h1, h2, h3, .magazine-title { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; } 

        .dark-glass { background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%); }

        .btn-mag {
            border: 1px solid #1a1a1a; padding: 8px 16px; font-size: 12px; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; background: transparent;
        }
        .btn-mag:hover:not(:disabled) { background: #1a1a1a; color: white; }
        .btn-mag:disabled { opacity: 0.5; cursor: not-allowed; }

        .dark .btn-mag { border-color: #e5e7eb; color: #e5e7eb; }
        .dark .btn-mag:hover:not(:disabled) { background: #e5e7eb; color: #1a1a1a; }
        
        .search-bar { border: none; border-bottom: 2px solid #1a1a1a; background: transparent; font-family: 'Lato', sans-serif; outline: none; transition: border-color 0.3s; }
        .search-bar:focus { border-bottom: 2px solid #0078D7; }
        .dark .search-bar { border-bottom-color: #e5e7eb; color: #e5e7eb; }
        .dark .search-bar:focus { border-bottom-color: #3b82f6; }

        .reader-y { flex-direction: column; overflow-y: auto; overflow-x: hidden; scroll-snap-type: y mandatory; }
        .reader-y .snap-page { scroll-snap-align: start; width: 100vw; height: 100vh; flex-shrink: 0; }
        
        .reader-x { flex-direction: row; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; }
        .reader-x .snap-page { scroll-snap-align: center; width: 100vw; height: 100vh; flex-shrink: 0; }

        @media (min-width: 768px) {
            .reader-y .snap-page:nth-child(even) {
                flex-direction: row-reverse !important;
            }
        }
    </style>
</head>
<body class="bg-light dark:bg-gray-900 dark:text-gray-100">

    <header id="globalHeader" class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-white/95 dark:bg-gray-900/95 backdrop-blur-md shadow-sm transition-all duration-500 ease-in-out transform">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-bold tracking-widest uppercase cursor-pointer text-gray-900 dark:text-white" onclick="openShelf()">MAGAZINE.</h1>
            <div class="relative hidden md:block">
                <span class="absolute left-0 bottom-2 text-gray-500 dark:text-gray-400">🔍</span>
                <input type="text" id="searchInput" placeholder="Search pages..." class="search-bar pl-6 py-2 w-64 text-sm font-bold tracking-wide" oninput="renderViews()">
            </div>
        </div>
        
        <div class="flex gap-4 relative z-50">
            <button onclick="toggleDarkMode()" id="darkModeBtn" class="btn-mag flex items-center gap-2 border-gray-300 dark:border-gray-600 transition-colors">
                <span id="darkModeIcon" class="text-lg leading-none">🌙</span> 
                <span id="darkModeText" class="font-bold">DARK</span>
            </button>
            <button onclick="toggleSafeMode()" id="safeModeBtn" class="btn-mag text-[#107C10] dark:text-green-400 flex items-center gap-2 border-gray-300 dark:border-gray-600 transition-colors hidden md:flex">
                <span id="safeModeIcon" class="text-lg leading-none">🛡️</span> 
                <span id="safeModeText" class="font-bold">SAFE: ON</span>
            </button>
            <button onclick="document.getElementById('importFile').click()" class="btn-mag hidden md:block">📥 RESTORE</button>
            <input type="file" id="importFile" accept=".json,.txt" class="hidden" onchange="importData(event)">
            <button onclick="exportData()" class="btn-mag hidden md:block">📦 BACKUP (.JSON)</button>
            <button onclick="openForm('magazine')" id="btnGlobalAdd" class="btn-mag bg-black dark:bg-gray-200 text-white dark:text-black font-bold cursor-pointer hover:bg-gray-800 dark:hover:bg-white">+ NEW MAGAZINE</button>
        </div>
    </header>

    <main id="shelfView" class="w-full h-screen overflow-y-auto pt-28 px-8 pb-12 dark:bg-gray-900">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-4xl italic mb-12 text-center text-gray-800 dark:text-gray-200">Magazine Shelf</h2>
            <div id="magazineGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
        </div>
    </main>

    <main id="insideView" class="hidden w-full h-screen overflow-y-auto pt-28 px-8 pb-12 bg-gray-50 dark:bg-gray-800">
        <div class="max-w-6xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 border-b-2 border-black dark:border-gray-500 pb-4 gap-4">
                <div>
                    <button onclick="openShelf()" class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest hover:text-black dark:hover:text-white mb-2">← BACK TO SHELF</button>
                    <h2 id="insideTitle" class="text-5xl font-bold magazine-title text-gray-900 dark:text-white uppercase">Magazine Title</h2>
                    <p id="insideDesc" class="text-gray-600 dark:text-gray-400 mt-2 text-sm italic max-w-2xl"></p>
                    <p id="insideCount" class="text-gray-400 mt-2 tracking-widest text-xs font-bold uppercase">0 Pages</p>
                </div>
                <div class="flex flex-wrap gap-4 w-full md:w-auto">
                    <button onclick="downloadMagazineHTML()" id="btnDownloadHtml" class="btn-mag bg-[#0078D7] text-white border-none hover:bg-blue-800 dark:bg-blue-600 dark:text-white font-bold">🌐 DOWNLOAD HTML</button>
                    <button onclick="openForm('page')" class="btn-mag bg-white dark:bg-gray-700 text-black dark:text-white font-bold">+ ADD PAGE</button>
                    <button onclick="startReading()" class="btn-mag bg-black dark:bg-gray-200 text-white dark:text-black font-bold shadow-lg border-none px-6">📖 READ MAGAZINE</button>
                </div>
            </div>
            <div id="pageGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <div id="readerView" class="hidden fixed inset-0 z-40 bg-black">
        <div id="readerContent" class="reader-x w-full h-full flex scroll-smooth"></div>
        
        <button id="btnPrevPage" onclick="prevPage()" class="fixed left-6 top-1/2 -translate-y-1/2 z-50 bg-black/60 text-white w-14 h-14 rounded-full items-center justify-center hover:bg-black/90 transition-all duration-500 opacity-100 hidden md:flex text-2xl font-bold shadow-xl border border-gray-600">❮</button>
        <button id="btnNextPage" onclick="nextPage()" class="fixed right-6 top-1/2 -translate-y-1/2 z-50 bg-black/60 text-white w-14 h-14 rounded-full items-center justify-center hover:bg-black/90 transition-all duration-500 opacity-100 hidden md:flex text-2xl font-bold shadow-xl border border-gray-600">❯</button>

        <button onclick="toggleReaderUI()" title="Toggle Menu (M / ESC)" class="fixed bottom-6 right-6 z-[60] bg-white/20 backdrop-blur-md text-white w-12 h-12 rounded-full flex items-center justify-center opacity-50 hover:opacity-100 transition-opacity duration-300 text-xl shadow-2xl border border-gray-400">👁️</button>

        <div id="readerUI" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-wrap justify-center gap-2 w-full px-4 transition-all duration-500 ease-in-out transform opacity-100">
            <button onclick="toggleReaderMode()" id="btnReaderMode" class="btn-mag bg-black/80 dark:bg-gray-800/80 text-white font-bold shadow-2xl border border-gray-600 hover:scale-105 backdrop-blur-md">↕️ VERTICAL SCROLL</button>
            <button onclick="closeReader()" class="btn-mag bg-white/90 dark:bg-gray-300/90 text-black font-bold shadow-2xl border-none hover:scale-105 backdrop-blur-md">📂 PAGE LIST</button>
            <button onclick="closeToShelf()" class="btn-mag bg-[#D83B01]/90 text-white font-bold shadow-2xl border-none hover:scale-105 backdrop-blur-md">🏠 MAGAZINE SHELF</button>
        </div>
    </div>

    <div id="imageViewer" class="hidden fixed inset-0 z-[200] bg-black/95 flex items-center justify-center overflow-hidden touch-none">
        <button onclick="closeImageViewer()" class="absolute top-6 right-6 text-white text-xl z-10 bg-black/50 hover:bg-red-600 w-12 h-12 rounded-full border border-gray-600 transition-colors">✕</button>
        <div class="absolute bottom-6 text-white/50 text-xs tracking-widest uppercase font-bold z-10 pointer-events-none">Scroll / Pinch to Zoom • Drag to Navigate</div>
        <img id="zoomImage" src="" class="max-w-full max-h-full object-contain transition-transform duration-100 ease-out" style="transform-origin: center; cursor: grab;">
    </div>

    <div id="formModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 shadow-2xl w-full max-w-3xl p-8 relative max-h-[95vh] overflow-y-auto">
            <button type="button" onclick="closeForm()" class="absolute top-4 right-4 text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white text-2xl font-light">✕</button>
            <h2 id="formTitle" class="text-3xl mb-6 magazine-title text-gray-900 dark:text-white">Form</h2>
            
            <form id="mediaForm" class="space-y-4">
                <input type="hidden" id="editIdInput">
                <input type="hidden" id="oldCategoryInput">
                
                <div id="magazineFields" class="hidden space-y-4 border-b pb-6 border-gray-200 dark:border-gray-700">
                    <div>
                        <label class="text-xs tracking-widest text-gray-500 dark:text-gray-400 uppercase">Magazine Name</label>
                        <input type="text" id="magNameInput" placeholder="e.g., Design Inspiration 2026" class="w-full p-3 border-b-2 border-gray-300 dark:border-gray-600 focus:border-black dark:focus:border-white outline-none bg-transparent font-bold text-lg text-gray-900 dark:text-white">
                    </div>
                    <div>
                        <label class="text-xs tracking-widest text-gray-500 dark:text-gray-400 uppercase">Description (Optional)</label>
                        <textarea id="magDescInput" rows="2" placeholder="Collection of ideas and visual references..." class="w-full p-3 border-b-2 border-gray-300 dark:border-gray-600 focus:border-black dark:focus:border-white outline-none bg-transparent resize-none text-gray-900 dark:text-white"></textarea>
                    </div>
                </div>

                <div id="pageFields" class="hidden space-y-5 border-b pb-6 border-gray-200 dark:border-gray-700">
                    <div class="bg-gray-50 dark:bg-gray-900 p-4 border border-gray-200 dark:border-gray-700 relative">
                        <label class="text-xs tracking-widest text-gray-800 dark:text-gray-300 font-bold uppercase block mb-2">1. Media / Collage Links</label>
                        <p class="text-[10px] text-gray-500 dark:text-gray-400 mb-2">Separate with "Enter". Smart Layout: Landscape = 1 image, Portrait = 2 images per page.</p>
                        <textarea id="urlInput" rows="3" placeholder="https://image-link-1.jpg&#10;https://video-link-2.mp4" class="w-full p-3 border-b-2 border-gray-300 dark:border-gray-600 focus:border-blue-500 outline-none bg-transparent text-blue-600 dark:text-blue-400 resize-y"></textarea>
                    </div>
                    
                    <div class="bg-blue-50/50 dark:bg-blue-900/30 p-4 border border-blue-100 dark:border-blue-800">
                        <label class="text-xs tracking-widest text-blue-800 dark:text-blue-300 font-bold uppercase block mb-2">2. Original Source Link (Optional)</label>
                        <p class="text-[10px] text-blue-600 dark:text-blue-400 mb-2">For reference only. Will appear as an "Open Original Source" button.</p>
                        <input type="text" id="sourceUrlInput" placeholder="https://news-source.com/article" class="w-full p-3 border-b-2 border-blue-200 dark:border-blue-700 focus:border-blue-600 outline-none bg-transparent text-blue-800 dark:text-blue-200">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs tracking-widest text-gray-500 dark:text-gray-400 uppercase">3. Headline (Title - Optional)</label>
                            <input type="text" id="titleInput" placeholder="Leave blank if you only want photos" class="w-full p-3 border-b-2 border-gray-300 dark:border-gray-600 focus:border-black dark:focus:border-white outline-none bg-transparent text-gray-900 dark:text-white">
                        </div>
                        <div>
                            <label class="text-xs tracking-widest text-gray-500 dark:text-gray-400 uppercase">4. Article / Notes</label>
                            <textarea id="notesInput" rows="3" placeholder="Smart Layout: Pure text will automatically split into 2 magazine columns." class="w-full p-3 border-b-2 border-gray-300 dark:border-gray-600 focus:border-black dark:focus:border-white outline-none bg-transparent resize-none text-gray-900 dark:text-white"></textarea>
                        </div>
                    </div>
                </div>

                <div class="pt-2">
                    <label class="text-xs tracking-widest text-gray-500 dark:text-gray-400 uppercase">Tags</label>
                    <input type="text" id="tagsInput" placeholder="news, ai, 2026..." class="w-full p-3 border-b-2 border-gray-300 dark:border-gray-600 focus:border-black dark:focus:border-white outline-none bg-transparent text-sm text-gray-900 dark:text-white">
                    
                    <label class="flex items-center gap-3 text-xs font-bold tracking-widest text-[#D83B01] dark:text-red-400 p-4 border border-red-100 dark:border-red-900 bg-red-50 dark:bg-red-900/20 cursor-pointer hover:border-[#D83B01] transition mt-4">
                        <input type="checkbox" id="nsfwCheckbox" class="w-5 h-5 accent-[#D83B01] cursor-pointer rounded-none">
                        MARK AS NSFW / PRIVATE
                    </label>
                </div>

                <button type="submit" id="btnSubmitForm" class="btn-mag bg-black dark:bg-white text-white dark:text-black w-full mt-6 text-sm font-bold py-4 shadow-lg transition-all">SAVE PAGE</button>
            </form>
        </div>
    </div>

    <script>
        function applyDarkModeUI() {
            const isDark = document.documentElement.classList.contains('dark');
            const btnText = document.getElementById('darkModeText');
            const btnIcon = document.getElementById('darkModeIcon');
            if(btnText) {
                btnText.innerText = isDark ? "LIGHT" : "DARK";
                btnIcon.innerText = isDark ? "☀️" : "🌙";
            }
        }

        if(localStorage.getItem('magFlipDarkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
        applyDarkModeUI();

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('magFlipDarkMode', isDark);
            applyDarkModeUI();
            renderViews(); 
        }

        // --- 256 COLOR PALETTE GENERATOR ---
        const magPalette = [];
        for(let i = 0; i < 128; i++) magPalette.push(`hsl(${Math.floor((i/128)*360)}, 80%, 45%)`);
        for(let i = 0; i < 128; i++) magPalette.push(`hsl(${Math.floor((i/128)*360)}, 65%, 85%)`);

        function getPaletteColor(str) {
            let hash = 0; if (!str) str = "default";
            for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
            return magPalette[Math.abs(hash) % 256];
        }

        let magData = [];
        try {
            const rawData = localStorage.getItem('magFlipData');
            if (rawData) { magData = JSON.parse(rawData); if (!Array.isArray(magData)) magData = []; }
        } catch (e) { magData = []; }
        
        let activeHlsEngines = []; let currentView = 'shelf'; let currentMagazine = null; 
        let currentReaderDirection = 'x'; let currentFormMode = 'magazine'; let isSafeMode = true; 
        
        // --- MANUAL UI TOGGLE ---
        let isUIVisible = true;
        function toggleReaderUI() {
            isUIVisible = !isUIVisible;
            const uiBottom = document.getElementById('readerUI');
            const uiTop = document.getElementById('globalHeader');
            const btnPrev = document.getElementById('btnPrevPage');
            const btnNext = document.getElementById('btnNextPage');
            
            if (isUIVisible) {
                if(uiBottom) uiBottom.classList.remove('opacity-0', 'pointer-events-none');
                if(uiTop) uiTop.classList.remove('opacity-0', '-translate-y-full', 'pointer-events-none');
                if(btnPrev) btnPrev.classList.remove('opacity-0', 'pointer-events-none');
                if(btnNext) btnNext.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                if(uiBottom) uiBottom.classList.add('opacity-0', 'pointer-events-none');
                if(uiTop) uiTop.classList.add('opacity-0', '-translate-y-full', 'pointer-events-none');
                if(btnPrev) btnPrev.classList.add('opacity-0', 'pointer-events-none');
                if(btnNext) btnNext.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        function saveData() { localStorage.setItem('magFlipData', JSON.stringify(magData)); renderViews(); }
        
        function splitTextIntoChunks(text, maxLength) {
            if (!text) return [];
            let chunks = []; let paragraphs = text.split('\n'); let currentChunk = '';
            for (let p of paragraphs) {
                if (p.length > maxLength) {
                    let words = p.split(/\s+/);
                    for (let word of words) {
                        if ((currentChunk.length + word.length + 1) > maxLength && currentChunk.length > 0) {
                            chunks.push(currentChunk.trim()); currentChunk = word + ' ';
                        } else { currentChunk += word + ' '; }
                    }
                    currentChunk += '\n'; 
                } else {
                    if ((currentChunk.length + p.length + 1) > maxLength && currentChunk.length > 0) {
                        chunks.push(currentChunk.trim()); currentChunk = p + '\n';
                    } else { currentChunk += p + '\n'; }
                }
            }
            if (currentChunk.trim()) chunks.push(currentChunk.trim());
            return chunks;
        }

        function getOrientation(url) {
            return new Promise((resolve) => {
                let type = detectMediaType(url);
                if (type !== 'image') return resolve('landscape'); 
                let img = new Image();
                img.onload = function() {
                    if (this.width > this.height * 1.1) resolve('landscape');
                    else if (this.height > this.width * 1.1) resolve('portrait');
                    else resolve('square');
                }
                img.onerror = function() { resolve('landscape'); }
                img.src = url;
            });
        }

        // --- FIXED REORDER AND DELETE LOGIC (CASTING ID TO STRING) ---
        function movePage(id, direction) {
            let mediaItems = getFilteredData().filter(i => i.type !== 'meta' && i.category === currentMagazine);
            let pos = mediaItems.findIndex(i => String(i.id) === String(id));
            if (pos === -1) return;
            
            let targetPos = pos + direction;
            if (targetPos < 0 || targetPos >= mediaItems.length) return;
            
            let item1 = mediaItems[pos]; 
            let item2 = mediaItems[targetPos];
            
            let idx1 = magData.findIndex(i => String(i.id) === String(item1.id)); 
            let idx2 = magData.findIndex(i => String(i.id) === String(item2.id));
            
            if (idx1 !== -1 && idx2 !== -1) { 
                let temp = magData[idx1]; 
                magData[idx1] = magData[idx2]; 
                magData[idx2] = temp; 
                saveData(); 
            }
        }

        function deletePage(id) {
            if (confirm("Delete this page from the magazine?")) {
                // BUG FIXED: Memaksa kedua ID menjadi String agar kompatibel dengan memori lama
                magData = magData.filter(i => String(i.id) !== String(id));
                saveData();
            }
        }

        function setCover(id, category) { 
            magData.forEach(i => { if (i.category === category) i.isCover = false; }); 
            const target = magData.find(i => String(i.id) === String(id)); 
            if (target) target.isCover = true; 
            saveData(); 
        }

        const imgView = document.getElementById('imageViewer'); const zoomImg = document.getElementById('zoomImage');
        let zScale = 1, zPanning = false, zPointX = 0, zPointY = 0, zStartX = 0, zStartY = 0; let initialPinchDistance = null, initialScale = 1;
        function openImageViewer(url) { zoomImg.src = url; zScale = 1; zPointX = 0; zPointY = 0; zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`; imgView.classList.remove('hidden'); }
        function closeImageViewer() { imgView.classList.add('hidden'); zoomImg.src = ''; }
        zoomImg.onmousedown = function(e) { e.preventDefault(); zPanning = true; zStartX = e.clientX - zPointX; zStartY = e.clientY - zPointY; zoomImg.classList.replace('cursor-grab', 'cursor-grabbing'); }
        imgView.onmouseup = function() { zPanning = false; zoomImg.classList.replace('cursor-grabbing', 'cursor-grab'); }
        imgView.onmouseleave = function() { zPanning = false; zoomImg.classList.replace('cursor-grabbing', 'cursor-grab'); }
        imgView.onmousemove = function(e) { if(!zPanning) return; zPointX = e.clientX - zStartX; zPointY = e.clientY - zStartY; zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`; }
        imgView.onwheel = function(e) { e.preventDefault(); let xs = (e.clientX - zPointX) / zScale; let ys = (e.clientY - zPointY) / zScale; let delta = (e.wheelDelta ? -e.wheelDelta : e.deltaY); (delta > 0) ? (zScale /= 1.2) : (zScale *= 1.2); zScale = Math.min(Math.max(1, zScale), 4); zPointX = e.clientX - xs * zScale; zPointY = e.clientY - ys * zScale; if(zScale === 1) { zPointX = 0; zPointY = 0; } zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`; }
        imgView.addEventListener('touchstart', (e) => { if (e.touches.length === 2) { initialPinchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); initialScale = zScale; } else if (e.touches.length === 1) { zPanning = true; zStartX = e.touches[0].clientX - zPointX; zStartY = e.touches[0].clientY - zPointY; } });
        imgView.addEventListener('touchmove', (e) => { if (e.touches.length === 2) { e.preventDefault(); const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); zScale = Math.min(Math.max(1, initialScale * (currentDistance / initialPinchDistance)), 4); zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`; } else if (e.touches.length === 1 && zPanning) { e.preventDefault(); zPointX = e.touches[0].clientX - zStartX; zPointY = e.touches[0].clientY - zStartY; zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`; } }, {passive: false});
        imgView.addEventListener('touchend', (e) => { if (e.touches.length < 2) initialPinchDistance = null; if (e.touches.length === 0) { zPanning = false; if(zScale === 1) { zPointX = 0; zPointY = 0; zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`; } } });

        function generatePageHtml(item, globalPageCount, isDarkExport) {
            let urlsToRender = item.urls && item.urls.length > 0 ? item.urls : (item.url ? [item.url] : []);
            let isReverse = (globalPageCount % 2 === 0); 
            let flexDirClass = isReverse ? 'md:flex-row-reverse' : 'md:flex-row';
            let borderDirClass = isReverse ? 'border-l-2' : 'border-r-2';

            let hasMedia = urlsToRender.length > 0;
            let titleClean = item.title && item.title !== 'Tanpa Judul' ? item.title : '';
            let notesClean = item.notes || '';

    <script>

        function detectMediaType(url) {
            if (!url) return 'text_only'; if (url.match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i)) return 'image'; if (url.match(/\.(mp3|wav|ogg)(\?.*)?$/i)) return 'audio'; if (url.match(/\.(m3u|m3u8)(\?.*)?$/i)) return 'hls'; if (url.match(/\.(mp4|webm|gifv)(\?.*)?$/i)) return 'video'; const ytMatch = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/); if (ytMatch && ytMatch[2].length === 11) return 'youtube'; return 'iframe'; 
        }
        function getYoutubeId(url) { const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/); return (match && match[2].length === 11) ? match[2] : null; }
        
        function getThumbnailHtml(item) {

        }

        function prevPage() { const slider = document.getElementById('readerContent'); const walk = currentReaderDirection === 'x' ? window.innerWidth : window.innerHeight; if (currentReaderDirection === 'x') { slider.scrollBy({ left: -walk, behavior: 'smooth' }); } else { slider.scrollBy({ top: -walk, behavior: 'smooth' }); } }
        function nextPage() { const slider = document.getElementById('readerContent'); const walk = currentReaderDirection === 'x' ? window.innerWidth : window.innerHeight; if (currentReaderDirection === 'x') { slider.scrollBy({ left: walk, behavior: 'smooth' }); } else { slider.scrollBy({ top: walk, behavior: 'smooth' }); } }

        document.addEventListener('keydown', (e) => {
            if (currentView !== 'reader') return;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextPage(); }
            if (e.key === 'Escape' || e.key.toLowerCase() === 'm') toggleReaderUI();
        });

        function startReading() {
            if (!currentMagazine) return;
            const content = document.getElementById('readerContent'); const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            let mediaItems = getFilteredData().filter(i => i.category === currentMagazine && i.type !== 'meta'); if (keyword) mediaItems = mediaItems.filter(i => `${i.title} ${i.tags} ${i.notes}`.toLowerCase().includes(keyword));
            if (mediaItems.length === 0) return alert("No pages available to read.");
            currentView = 'reader'; content.innerHTML = ''; activeHlsEngines.forEach(eng => eng.destroy()); activeHlsEngines = [];

            const isDark = document.documentElement.classList.contains('dark');
            let coverColor = getPaletteColor(currentMagazine);

            content.innerHTML += `
                <div class="snap-page flex flex-col items-center justify-center text-white p-8 relative shadow-2xl pointer-events-none" style="background-color: ${coverColor}">
                    <div class="bg-black/50 p-12 backdrop-blur-sm w-full h-full flex flex-col items-center justify-center">
                        <h2 class="text-5xl md:text-8xl mb-4 text-center magazine-title uppercase drop-shadow-lg">${currentMagazine}</h2>
                        <p class="text-xl font-light tracking-widest uppercase mb-12 drop-shadow-md">${mediaItems.length} PAGES</p>
                        <div class="animate-pulse mt-8 border border-white rounded-full px-6 py-2 text-xs tracking-widest font-bold text-center">
                            SWIPE OR USE ARROWS TO READ<br>
                            <span class="text-[9px] mt-2 block opacity-70">PRESS 'M' OR 'ESC' FOR MENU</span>
                        </div>
                    </div>
                </div>
            `;

            let globalPageCount = 1;
            mediaItems.forEach((item) => {
                content.innerHTML += generatePageHtml(item, globalPageCount, isDark);
                globalPageCount++;
            });

            document.getElementById('readerView').classList.remove('hidden'); document.body.style.overflow = 'hidden';
            const btn = document.getElementById('btnReaderMode'); btn.innerText = currentReaderDirection === 'x' ? '↕️ VERTICAL SCROLL' : '↔️ HORIZONTAL FLIP';
            document.querySelectorAll('.hls-video-dynamic').forEach(videoEl => { let src = videoEl.getAttribute('data-src'); if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(src); hls.attachMedia(videoEl); activeHlsEngines.push(hls); } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) { videoEl.src = src; } });
            
            applyReaderDirection();
            
            isUIVisible = false; 
            toggleReaderUI(); 
        }

        function toggleReaderMode() { currentReaderDirection = currentReaderDirection === 'x' ? 'y' : 'x'; const btn = document.getElementById('btnReaderMode'); btn.innerText = currentReaderDirection === 'x' ? '↕️ VERTICAL SCROLL' : '↔️ HORIZONTAL FLIP'; applyReaderDirection(); }
        function applyReaderDirection() { const content = document.getElementById('readerContent'); if (currentReaderDirection === 'x') { content.classList.remove('reader-y'); content.classList.add('reader-x'); } else { content.classList.remove('reader-x'); content.classList.add('reader-y'); } }
        function closeReader() { currentView = 'inside'; const uiTop = document.getElementById('globalHeader'); uiTop.classList.remove('opacity-0', '-translate-y-full', 'pointer-events-none'); document.getElementById('readerView').classList.add('hidden'); document.getElementById('readerContent').innerHTML = ''; document.body.style.overflow = 'auto'; activeHlsEngines.forEach(eng => eng.destroy()); activeHlsEngines = []; }
        function closeToShelf() { closeReader(); openShelf(); }

        function openForm(mode, editId = null) { 
            currentFormMode = mode; document.getElementById('mediaForm').reset(); document.getElementById('nsfwCheckbox').checked = false; document.getElementById('editIdInput').value = '';
            const magFields = document.getElementById('magazineFields'); const pageFields = document.getElementById('pageFields'); const btnSubmit = document.getElementById('btnSubmitForm');
            
            if (mode === 'magazine') { document.getElementById('formTitle').innerText = "Create New Magazine"; magFields.classList.remove('hidden'); pageFields.classList.add('hidden'); btnSubmit.innerText = "CREATE MAGAZINE"; } 
            else if (mode === 'editMagazine') { document.getElementById('formTitle').innerText = `Edit Magazine`; magFields.classList.remove('hidden'); pageFields.classList.add('hidden'); const meta = magData.find(i => i.type === 'meta' && i.category === editId); if (meta) { document.getElementById('magNameInput').value = meta.category; document.getElementById('magDescInput').value = meta.notes || ''; document.getElementById('oldCategoryInput').value = meta.category; document.getElementById('nsfwCheckbox').checked = (meta.tags || '').toLowerCase().includes('nsfw'); } btnSubmit.innerText = "SAVE CHANGES"; }
            else if (mode === 'edit') { document.getElementById('formTitle').innerText = `Edit Page`; magFields.classList.add('hidden'); pageFields.classList.remove('hidden'); const item = magData.find(i => String(i.id) === String(editId)); if (item) { document.getElementById('editIdInput').value = item.id; document.getElementById('urlInput').value = (item.urls && item.urls.length > 0) ? item.urls.join('\n') : (item.url || ''); document.getElementById('sourceUrlInput').value = item.sourceUrl || ''; document.getElementById('titleInput').value = item.title || ''; document.getElementById('notesInput').value = item.notes || ''; document.getElementById('tagsInput').value = (item.tags || '').split(',').map(t=>t.trim()).filter(t=>t.toLowerCase()!=='nsfw').join(', '); document.getElementById('nsfwCheckbox').checked = (item.tags || '').toLowerCase().includes('nsfw'); } btnSubmit.innerText = "SAVE CHANGES"; }
            else { document.getElementById('formTitle').innerText = `Add Page`; magFields.classList.add('hidden'); pageFields.classList.remove('hidden'); btnSubmit.innerText = "SAVE PAGE"; }
            document.getElementById('formModal').classList.remove('hidden'); 
        }
        
        window.openForm = openForm;
        function closeForm() { document.getElementById('formModal').classList.add('hidden'); }

        document.getElementById('mediaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmitForm');
            let originalText = btnSubmit.innerText;
            btnSubmit.innerText = "⏳ PROCESSING...";
            btnSubmit.disabled = true;

            try {
                let tagsArray = document.getElementById('tagsInput').value.trim().split(',').map(t => t.trim()).filter(t => t && t.toLowerCase() !== 'nsfw');
                if (document.getElementById('nsfwCheckbox').checked) tagsArray.push('nsfw'); let finalTags = tagsArray.join(', ');

                if (currentFormMode === 'magazine' || currentFormMode === 'editMagazine') {
                    let magName = document.getElementById('magNameInput').value.trim();
                    if(!magName) { alert("Magazine name is required!"); return; }
                    if (currentFormMode === 'editMagazine') { let oldCategory = document.getElementById('oldCategoryInput').value; magData.forEach(i => { if (i.category === oldCategory) i.category = magName; if (i.type === 'meta' && i.category === magName) { i.notes = document.getElementById('magDescInput').value.trim(); i.tags = finalTags; } }); } 
                    else { let newMeta = { id: Date.now().toString(), type: 'meta', category: magName, notes: document.getElementById('magDescInput').value.trim(), tags: finalTags, createdAt: new Date().toISOString() }; magData.push(newMeta); }
                    saveData(); closeForm(); openShelf();
                } else {
                    let rawInput = document.getElementById('urlInput').value.trim(); let rawUrls = rawInput.split('\n').map(u => u.trim().replace(/\.gifv(\?.*)?$/i, '.mp4$1')).filter(u => u !== '');
                    let sourceUrl = document.getElementById('sourceUrlInput').value.trim(); let inputNotes = document.getElementById('notesInput').value.trim(); let inputTitle = document.getElementById('titleInput').value.trim();

                    if(rawUrls.length === 0 && !inputNotes && !sourceUrl){ alert("Please provide at least a Media Link OR an Article Note."); return; }

                    let mediaOrientations = await Promise.all(rawUrls.map(u => getOrientation(u)));
                    let mediaChunks = []; let currentMChunk = [];
                    
                    for (let i = 0; i < rawUrls.length; i++) {
                        let u = rawUrls[i]; let ori = mediaOrientations[i];
                        if (ori === 'landscape') { if (currentMChunk.length > 0) { mediaChunks.push(currentMChunk); currentMChunk = []; } mediaChunks.push([u]); } 
                        else { currentMChunk.push(u); if (currentMChunk.length === 2) { mediaChunks.push(currentMChunk); currentMChunk = []; } }
                    }
                    if (currentMChunk.length > 0) mediaChunks.push(currentMChunk);
                    if (mediaChunks.length === 0) mediaChunks.push([]);

                    let textChunks = splitTextIntoChunks(inputNotes, 1500); 
                    let numPages = Math.max(textChunks.length, mediaChunks.length, 1);
                    let generatedItems = [];

                    for (let j = 0; j < numPages; j++) {
                        let chunkText = textChunks[j] || ''; let chunkUrls = mediaChunks[j] || mediaChunks[0] || []; let primaryUrl = chunkUrls.length > 0 ? chunkUrls[0] : '';
                        let chunkTitle = inputTitle; if (inputTitle && j > 0) chunkTitle = `${inputTitle} (Continued ${j+1})`;
                        let newPage = { id: Date.now().toString() + "_" + j, url: primaryUrl, urls: chunkUrls, sourceUrl: sourceUrl, type: detectMediaType(primaryUrl), category: currentMagazine, title: chunkTitle, tags: finalTags, notes: chunkText, isCover: false, createdAt: new Date().toISOString() };
                        generatedItems.push(newPage);
                    }

                    if (currentFormMode === 'edit') { let editId = document.getElementById('editIdInput').value; let itemIndex = magData.findIndex(i => String(i.id) === String(editId)); if (itemIndex > -1) { magData.splice(itemIndex, 1, ...generatedItems); } } 
                    else { magData.unshift(...generatedItems); }
                    saveData(); closeForm();
                }
            } catch (err) { console.error(err); alert("Error saving page."); } finally { btnSubmit.innerText = originalText; btnSubmit.disabled = false; }
        });

        function exportData() {
            if (magData.length === 0) return alert("No data to backup.");
            const blob = new Blob([JSON.stringify(magData, null, 2)], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "Magazine_Backup.json"; document.body.appendChild(a); a.click(); URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            if (file.name.endsWith('.html')) { alert("Please select the JSON backup file, not the Standalone HTML file."); document.getElementById('importFile').value = ''; return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) { importedData.forEach(item => { if (item.type === 'meta') { let existingIndex = magData.findIndex(i => i.type === 'meta' && i.category === item.category); if (existingIndex === -1) magData.push(item); } else { let exists = magData.find(i => String(i.id) === String(item.id)); if (!exists) magData.unshift(item); } }); saveData(); alert(`Backup data restored successfully!`); } 
                    else { alert("Invalid file format."); }
                } catch (err) { alert("Invalid JSON file. Please ensure it is a valid backup file."); }
                document.getElementById('importFile').value = ''; 
            };
            reader.readAsText(file);
        }

        openShelf();
    </script>
</body>
