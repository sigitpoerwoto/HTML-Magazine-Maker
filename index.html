<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Magazine - Master Manager Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');
        
        body { font-family: 'Lato', sans-serif; background-color: #f8f9fa; color: #1a1a1a; margin: 0; overflow: hidden; }
        h1, h2, h3, .magazine-title { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; } 

        .dark-glass { background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%); }

        .btn-mag {
            border: 1px solid #1a1a1a; padding: 8px 16px; font-size: 12px; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; background: transparent;
        }
        .btn-mag:hover:not(:disabled) { background: #1a1a1a; color: white; }
        .btn-mag:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .search-bar { border: none; border-bottom: 2px solid #1a1a1a; background: transparent; font-family: 'Lato', sans-serif; outline: none; transition: border-color 0.3s; }
        .search-bar:focus { border-bottom: 2px solid #0078D7; }

        .reader-y { flex-direction: column; overflow-y: auto; overflow-x: hidden; scroll-snap-type: y mandatory; }
        .reader-y .snap-page { scroll-snap-align: start; width: 100vw; height: 100vh; flex-shrink: 0; }
        
        .reader-x { flex-direction: row; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; }
        .reader-x .snap-page { scroll-snap-align: center; width: 100vw; height: 100vh; flex-shrink: 0; }

        @media (min-width: 768px) {
            .reader-y .snap-page:nth-child(even) {
                flex-direction: row-reverse !important;
            }
        }
    </style>
</head>
<body>

    <header id="globalHeader" class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-white/95 backdrop-blur-md shadow-sm transition-all duration-500 ease-in-out transform">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-bold tracking-widest uppercase cursor-pointer" onclick="openShelf()">MAGAZINE.</h1>
            <div class="relative hidden md:block">
                <span class="absolute left-0 bottom-2 text-gray-500">🔍</span>
                <input type="text" id="searchInput" placeholder="Cari info lembaran..." class="search-bar pl-6 py-2 w-64 text-sm font-bold tracking-wide" oninput="renderViews()">
            </div>
        </div>
        
        <div class="flex gap-4 relative z-50">
            <button onclick="toggleSafeMode()" id="safeModeBtn" class="btn-mag text-[#107C10] bg-white flex items-center gap-2 border-gray-300 transition-colors hidden md:flex">
                <span id="safeModeIcon" class="text-lg leading-none">🛡️</span> 
                <span id="safeModeText" class="font-bold">SAFE: ON</span>
            </button>
            <button onclick="document.getElementById('importFile').click()" class="btn-mag bg-white font-bold hidden md:block">📥 IMPORT</button>
            <input type="file" id="importFile" accept=".json,.txt" class="hidden" onchange="importData(event)">
            <button onclick="exportData()" class="btn-mag bg-white font-bold hidden md:block">📤 EXPORT</button>
            <button onclick="openForm('magazine')" id="btnGlobalAdd" class="btn-mag bg-black text-white font-bold cursor-pointer">+ BUAT MAJALAH BARU</button>
        </div>
    </header>

    <main id="shelfView" class="w-full h-screen overflow-y-auto pt-28 px-8 pb-12">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-4xl italic mb-12 text-center text-gray-800">Rak Majalah</h2>
            <div id="magazineGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
        </div>
    </main>

    <main id="insideView" class="hidden w-full h-screen overflow-y-auto pt-28 px-8 pb-12 bg-gray-50">
        <div class="max-w-6xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 border-b-2 border-black pb-4 gap-4">
                <div>
                    <button onclick="openShelf()" class="text-sm font-bold text-gray-500 uppercase tracking-widest hover:text-black mb-2">← KEMBALI KE RAK</button>
                    <h2 id="insideTitle" class="text-5xl font-bold magazine-title text-gray-900 uppercase">Nama Majalah</h2>
                    <p id="insideDesc" class="text-gray-600 mt-2 text-sm italic max-w-2xl"></p>
                    <p id="insideCount" class="text-gray-400 mt-2 tracking-widest text-xs font-bold uppercase">0 Halaman</p>
                </div>
                <div class="flex flex-wrap gap-4 w-full md:w-auto">
                    <button onclick="downloadMagazineHTML()" id="btnDownloadHtml" class="btn-mag bg-[#0078D7] text-white font-bold border-none hover:bg-blue-800">🌐 UNDUH HTML</button>
                    <button onclick="openForm('page')" class="btn-mag bg-white text-black font-bold border-gray-300">+ TAMBAH HALAMAN</button>
                    <button onclick="startReading()" class="btn-mag bg-black text-white font-bold shadow-lg border-none px-6">📖 BACA MAJALAH</button>
                </div>
            </div>
            <div id="pageGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <div id="readerView" class="hidden fixed inset-0 z-40 bg-black">
        <div id="readerContent" class="reader-x w-full h-full flex scroll-smooth"></div>
        
        <button id="btnPrevPage" onclick="prevPage()" class="fixed left-6 top-1/2 -translate-y-1/2 z-50 bg-black/60 text-white w-14 h-14 rounded-full items-center justify-center hover:bg-black/90 transition-all duration-500 opacity-100 hidden md:flex text-2xl font-bold shadow-xl border border-gray-600">❮</button>
        <button id="btnNextPage" onclick="nextPage()" class="fixed right-6 top-1/2 -translate-y-1/2 z-50 bg-black/60 text-white w-14 h-14 rounded-full items-center justify-center hover:bg-black/90 transition-all duration-500 opacity-100 hidden md:flex text-2xl font-bold shadow-xl border border-gray-600">❯</button>

        <div id="readerUI" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-wrap justify-center gap-2 w-full px-4 transition-all duration-500 ease-in-out transform">
            <button onclick="toggleReaderMode()" id="btnReaderMode" class="btn-mag bg-black text-white font-bold shadow-2xl border border-gray-600 hover:scale-105">↕️ UBAH: SCROLL VERTIKAL</button>
            <button onclick="closeReader()" class="btn-mag bg-white text-black font-bold shadow-2xl border-none hover:scale-105">📂 DAFTAR HALAMAN</button>
            <button onclick="closeToShelf()" class="btn-mag bg-[#D83B01] text-white font-bold shadow-2xl border-none hover:scale-105">🏠 RAK MAJALAH</button>
        </div>
    </div>

    <div id="imageViewer" class="hidden fixed inset-0 z-[200] bg-black/95 flex items-center justify-center overflow-hidden touch-none">
        <button onclick="closeImageViewer()" class="absolute top-6 right-6 text-white text-xl z-10 bg-black/50 hover:bg-red-600 w-12 h-12 rounded-full border border-gray-600 transition-colors">✕</button>
        <div class="absolute bottom-6 text-white/50 text-xs tracking-widest uppercase font-bold z-10 pointer-events-none">Scroll / Cubit untuk Zoom • Geser untuk Navigasi</div>
        <img id="zoomImage" src="" class="max-w-full max-h-full object-contain transition-transform duration-100 ease-out" style="transform-origin: center; cursor: grab;">
    </div>

    <div id="formModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white border border-gray-300 shadow-2xl w-full max-w-3xl p-8 relative max-h-[95vh] overflow-y-auto">
            <button type="button" onclick="closeForm()" class="absolute top-4 right-4 text-gray-500 hover:text-black text-2xl font-light">✕</button>
            <h2 id="formTitle" class="text-3xl mb-6 magazine-title">Form</h2>
            
            <form id="mediaForm" class="space-y-4">
                <input type="hidden" id="editIdInput">
                <input type="hidden" id="oldCategoryInput">
                
                <div id="magazineFields" class="hidden space-y-4 border-b pb-6 border-gray-200">
                    <div>
                        <label class="text-xs tracking-widest text-gray-500 uppercase">Nama Majalah</label>
                        <input type="text" id="magNameInput" placeholder="Contoh: Inspirasi Desain 2026" class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent font-bold text-lg">
                    </div>
                    <div>
                        <label class="text-xs tracking-widest text-gray-500 uppercase">Deskripsi (Opsional)</label>
                        <textarea id="magDescInput" rows="2" placeholder="Kumpulan ide dan referensi visual..." class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent resize-none"></textarea>
                    </div>
                </div>

                <div id="pageFields" class="hidden space-y-5 border-b pb-6 border-gray-200">
                    <div class="bg-gray-50 p-4 border border-gray-200 relative">
                        <label class="text-xs tracking-widest text-gray-800 font-bold uppercase block mb-2">1. Tautan Media / Kolase</label>
                        <textarea id="urlInput" rows="3" placeholder="https://link-gambar-1.jpg&#10;https://link-video-2.mp4" class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent text-blue-600 resize-y"></textarea>
                    </div>
                    
                    <div class="bg-blue-50/50 p-4 border border-blue-100">
                        <label class="text-xs tracking-widest text-blue-800 font-bold uppercase block mb-2">2. Tautan Sumber Asli (Opsional)</label>
                        <input type="text" id="sourceUrlInput" placeholder="https://sumber-berita.com" class="w-full p-3 border-b-2 border-blue-200 focus:border-blue-600 outline-none bg-transparent">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs tracking-widest text-gray-500 uppercase">3. Headline (Judul - Opsional)</label>
                            <input type="text" id="titleInput" placeholder="Kosongkan jika hanya ingin foto" class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent">
                        </div>
                        <div>
                            <label class="text-xs tracking-widest text-gray-500 uppercase">4. Isi Artikel / Catatan</label>
                            <textarea id="notesInput" rows="3" class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent resize-none"></textarea>
                        </div>
                    </div>
                </div>

                <div class="pt-2">
                    <label class="text-xs tracking-widest text-gray-500 uppercase">Tags</label>
                    <input type="text" id="tagsInput" placeholder="berita, ai..." class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent text-sm">
                    
                    <label class="flex items-center gap-3 text-xs font-bold tracking-widest text-[#D83B01] p-4 border border-red-100 bg-red-50 cursor-pointer hover:border-[#D83B01] transition mt-4">
                        <input type="checkbox" id="nsfwCheckbox" class="w-5 h-5 accent-[#D83B01] cursor-pointer rounded-none">
                        TANDAI NSFW / PRIVATE
                    </label>
                </div>

                <button type="submit" id="btnSubmitForm" class="btn-mag bg-black text-white w-full mt-6 text-sm font-bold py-4 shadow-lg">SIMPAN</button>
            </form>
        </div>
    </div>

    <script>
        // INIT DATABASE & STATE
        let magData = [];
        try {
            const rawData = localStorage.getItem('magFlipData');
            if (rawData) {
                magData = JSON.parse(rawData);
                if (!Array.isArray(magData)) magData = [];
            }
        } catch (e) { magData = []; }
        
        let activeHlsEngines = [];
        let currentView = 'shelf'; 
        let currentMagazine = null; 
        let currentReaderDirection = 'x'; 
        let currentFormMode = 'magazine'; 
        let isSafeMode = true; 
        let readerUITimer = null;

        function saveData() { localStorage.setItem('magFlipData', JSON.stringify(magData)); renderViews(); }

        function getPastelColor(str) {
            let hash = 0; if (!str) str = "default";
            for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
            let r = (hash & 0xFF0000) >> 16; let g = (hash & 0x00FF00) >> 8; let b = hash & 0x0000FF;
            r = Math.floor((r + 255) / 2); g = Math.floor((g + 255) / 2); b = Math.floor((b + 255) / 2);
            return `rgb(${r}, ${g}, ${b})`;
        }

        // --- IMAGE ZOOM ---
        const imgView = document.getElementById('imageViewer');
        const zoomImg = document.getElementById('zoomImage');
        let zScale = 1, zPanning = false, zPointX = 0, zPointY = 0, zStartX = 0, zStartY = 0;
        let initialPinchDistance = null, initialScale = 1;

        function openImageViewer(url) {
            zoomImg.src = url; zScale = 1; zPointX = 0; zPointY = 0;
            zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`;
            imgView.classList.remove('hidden');
        }
        function closeImageViewer() { imgView.classList.add('hidden'); zoomImg.src = ''; }

        // --- HTML EXPORT ---
        function downloadMagazineHTML() {
            if (!currentMagazine) return;
            const btn = document.getElementById('btnDownloadHtml');
            btn.innerText = "⏳ MEMPROSES HTML..."; btn.disabled = true;

            let allItems = getFilteredData().filter(i => i.category === currentMagazine);
            const metaItem = allItems.find(i => i.type === 'meta');
            let mediaItems = allItems.filter(i => i.type !== 'meta');

            if (mediaItems.length === 0) { alert("Tidak ada halaman."); btn.innerText = "🌐 UNDUH HTML"; btn.disabled = false; return; }

            let pagesHtml = '';
            let globalPageCount = 1; 

            mediaItems.forEach((item) => {
                let urlsToRender = item.urls && item.urls.length > 0 ? item.urls : (item.url ? [item.url] : []);
                let isReverse = (globalPageCount % 2 === 0); 
                let flexDirClass = isReverse ? 'md:flex-row-reverse' : 'md:flex-row';
                let borderDirClass = isReverse ? 'border-l-2' : 'border-r-2';

                let mediaHtml = '';
                if (urlsToRender.length === 0 && item.type === 'text_only') {
                    mediaHtml = `<div class="w-full h-[30vh] md:h-full md:w-1/2 bg-[#1a1a1a] flex flex-col items-center justify-center p-12 text-center text-white border-b-4 md:border-b-0 ${isReverse ? 'md:border-l-4' : 'md:border-r-4'} border-[#0078D7]"><span class="text-6xl mb-6">📰</span><h2 class="text-3xl font-serif italic leading-tight mb-4">${item.title || 'Artikel'}</h2><div class="w-12 h-1 bg-white opacity-50 mb-4"></div><span class="text-xs tracking-widest uppercase font-bold opacity-70">Bacaan Teks</span></div>`;
                } else {
                    let gridCols = 'grid-cols-1'; let gridRows = 'grid-rows-1'; let len = urlsToRender.length;
                    if (len === 2) { gridCols = 'grid-cols-1'; gridRows = 'grid-rows-2'; }
                    else if (len >= 3 && len <= 4) { gridCols = 'grid-cols-2'; gridRows = 'grid-rows-2'; }
                    else if (len >= 5 && len <= 6) { gridCols = 'grid-cols-2'; gridRows = 'grid-rows-3'; }
                    else if (len >= 7) { gridCols = 'grid-cols-2'; gridRows = 'grid-rows-4'; }
                    mediaHtml = `<div class="w-full h-[40vh] md:h-full md:w-1/2 bg-[#111] grid ${gridCols} ${gridRows} gap-1 p-1 overflow-hidden">`;
                    urlsToRender.forEach(u => {
                        let uType = detectMediaType(u);
                        if (uType === 'image') mediaHtml += `<a href="${u}" target="_blank" class="relative w-full h-full bg-[#111] group overflow-hidden block"><div class="absolute inset-0 ${len === 1 ? 'bg-contain' : 'bg-cover'} bg-no-repeat bg-center transition-transform duration-500 group-hover:scale-105" style="background-image: url('${u}')"></div></a>`;
                        else if (uType === 'video') mediaHtml += `<div class="w-full h-full bg-black flex items-center justify-center"><video controls class="max-w-full max-h-full w-full h-full object-contain"><source src="${u}"></video></div>`;
                        else if (uType === 'hls') mediaHtml += `<div class="w-full h-full bg-black flex items-center justify-center"><video data-src="${u}" controls class="max-w-full max-h-full w-full h-full object-contain hls-video-dynamic"></video></div>`;
                        else if (uType === 'youtube') mediaHtml += `<div class="w-full h-full"><iframe class="w-full h-full" src="https://www.youtube.com/embed/${getYoutubeId(u)}" frameborder="0" allowfullscreen></iframe></div>`;
                        else mediaHtml += `<div class="w-full h-full bg-blue-900 flex flex-col items-center justify-center p-4 text-center text-white"><span class="text-3xl mb-2">🌐</span><span class="text-[10px] font-bold">Sumber Eksternal</span></div>`;
                    });
                    mediaHtml += `</div>`;
                }

                let notesClean = item.notes || '';
                let rightPanelBg = (item.title || notesClean) ? '#fcfcfc' : getPastelColor(urlsToRender[0] || item.id);
                let rightPanelHtml = (item.title || notesClean || item.sourceUrl) ? `<div class="mb-4">${(item.tags || '').split(',').filter(t=>t.trim() && t.trim().toLowerCase()!=='nsfw').map(t=> `<span class="text-[10px] tracking-widest uppercase text-gray-500 font-bold border border-gray-300 px-2 py-1 mr-2 mb-2 inline-block">#${t.trim()}</span>`).join('')}</div>${item.title ? `<h3 class="text-3xl md:text-4xl font-bold mb-4 magazine-title leading-tight">${item.title}</h3><div class="w-16 h-1 bg-black mb-6 flex-shrink-0"></div>` : ''}${notesClean ? `<p class="text-sm md:text-base text-gray-700 leading-relaxed font-light text-justify">${notesClean.replace(/\n/g, '<br>')}</p>` : ''}${item.sourceUrl ? `<div class="mt-8 pt-6 border-t border-gray-200"><a href="${item.sourceUrl}" target="_blank" class="inline-block border border-[#0078D7] text-[#0078D7] hover:bg-[#0078D7] hover:text-white px-4 py-2 text-[10px] font-bold tracking-widest uppercase transition">🔗 SUMBER ASLI</a></div>` : ''}` : '';

                pagesHtml += `<div class="snap-page flex flex-col ${flexDirClass} shadow-2xl overflow-hidden border-gray-200 ${borderDirClass}" style="background-color: ${rightPanelBg};">${mediaHtml}<div class="w-full h-[60vh] md:h-full md:w-1/2 p-6 md:p-16 flex flex-col overflow-y-auto pb-32">${rightPanelHtml}</div></div>`;
                globalPageCount++;
            });

            let htmlContent = `<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${currentMagazine}</title><script src="https://cdn.tailwindcss.com"><\/script><script src="https://cdn.jsdelivr.net/npm/hls.js@latest"><\/script><style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');body { font-family: 'Lato', sans-serif; background-color: #000; margin: 0; overflow: hidden; }h1, h2, h3, .magazine-title { font-family: 'Playfair Display', serif; }::-webkit-scrollbar { width: 0; height: 0; display: none; }.reader-x { display: flex; flex-direction: row; overflow-x: scroll; overflow-y: hidden; scroll-snap-type: x mandatory; height: 100vh; width: 100vw; scroll-behavior: smooth; }.snap-page { flex: 0 0 100vw; width: 100vw; height: 100vh; scroll-snap-align: center; display: flex; }</style></head><body><div id="readerContent" class="reader-x w-full h-full"><div class="snap-page bg-black flex flex-col items-center justify-center text-white p-8 relative shadow-2xl"><h2 class="text-5xl md:text-8xl mb-4 text-center magazine-title uppercase">${currentMagazine}</h2><p class="text-xl font-light tracking-widest uppercase mb-12">${mediaItems.length} HALAMAN</p><p class="text-sm font-light text-gray-400 max-w-2xl text-center mb-8">${metaItem && metaItem.notes ? metaItem.notes : ''}</p><div class="animate-pulse mt-8 border border-white rounded-full px-6 py-2 text-xs tracking-widest font-bold">GESER KIRI-KANAN UNTUK MEMBACA</div></div>${pagesHtml}</div><button id="btnPrev" onclick="prevPage()" style="position:fixed;left:24px;top:50%;transform:translateY(-50%);z-index:50;background:rgba(0,0,0,0.6);color:white;width:56px;height:56px;border-radius:50%;border:1px solid #444;font-size:24px;">❮</button><button id="btnNext" onclick="nextPage()" style="position:fixed;right:24px;top:50%;transform:translateY(-50%);z-index:50;background:rgba(0,0,0,0.6);color:white;width:56px;height:56px;border-radius:50%;border:1px solid #444;font-size:24px;">❯</button><script>document.querySelectorAll('.hls-video-dynamic').forEach(v=>{let s=v.getAttribute('data-src');if(typeof Hls!=='undefined'&&Hls.isSupported()){let h=new Hls();h.loadSource(s);h.attachMedia(v);}else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=s;}});const s=document.getElementById('readerContent');const bp=document.getElementById('btnPrev');const bn=document.getElementById('btnNext');let t;function r(){bp.style.opacity='1';bn.style.opacity='1';clearTimeout(t);t=setTimeout(()=>{bp.style.opacity='0';bn.style.opacity='0';},2500);}document.addEventListener('mousemove',r);s.addEventListener('scroll',r);function prevPage(){s.scrollBy({left:-window.innerWidth,behavior:'smooth'});r();}function nextPage(){s.scrollBy({left:window.innerWidth,behavior:'smooth'});r();}document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')prevPage();if(e.key==='ArrowRight'||e.key===' ')nextPage();});r();<\/script></body></html>`;

            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `${currentMagazine}_Digital.html`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            btn.innerText = "🌐 UNDUH HTML"; btn.disabled = false;
        }

        // --- NAVIGATION ---
        function toggleSafeMode() {
            isSafeMode = !isSafeMode;
            const btn = document.getElementById('safeModeBtn');
            const icon = document.getElementById('safeModeIcon');
            const text = document.getElementById('safeModeText');
            if (isSafeMode) {
                icon.innerText = "🛡️"; text.innerText = "SAFE: ON";
                btn.classList.remove('text-[#D83B01]', 'border-[#D83B01]'); btn.classList.add('text-[#107C10]', 'border-gray-300');
            } else {
                icon.innerText = "🔞"; text.innerText = "UNSAFE: OFF";
                btn.classList.remove('text-[#107C10]', 'border-gray-300'); btn.classList.add('text-[#D83B01]', 'border-[#D83B01]');
            }
            renderViews();
        }

        function getFilteredData() {
            let data = magData;
            if (isSafeMode) {
                const nsfwCats = new Set(magData.filter(i => i.type === 'meta' && (i.tags || '').toLowerCase().includes('nsfw')).map(i => i.category));
                data = data.filter(i => !((i.tags || '').toLowerCase().includes('nsfw')) && !nsfwCats.has(i.category));
            }
            return data;
        }

        function openShelf() {
            currentView = 'shelf'; currentMagazine = null;
            document.getElementById('insideView').classList.add('hidden');
            document.getElementById('shelfView').classList.remove('hidden');
            document.getElementById('globalHeader').classList.remove('opacity-0', '-translate-y-full', 'pointer-events-none');
            renderViews();
        }

        function openInside(category) {
            currentView = 'inside'; currentMagazine = category;
            document.getElementById('shelfView').classList.add('hidden');
            document.getElementById('insideView').classList.remove('hidden');
            renderViews();
        }

        function deleteMagazine(category) {
            if (confirm(`Hapus SELURUH majalah "${category}"?`)) {
                magData = magData.filter(i => i.category !== category); saveData(); openShelf();
            }
        }

        function renderShelf() {
            const grid = document.getElementById('magazineGrid');
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            grid.innerHTML = '';
            const activeData = getFilteredData();
            const grouped = activeData.reduce((acc, item) => { if (!acc[item.category]) acc[item.category] = []; acc[item.category].push(item); return acc; }, {});

            for (const [category, items] of Object.entries(grouped)) {
                if (keyword && !items.some(i => `${i.title} ${i.category} ${i.tags} ${i.notes}`.toLowerCase().includes(keyword))) continue;
                const meta = items.find(i => i.type === 'meta');
                const media = items.filter(i => i.type !== 'meta');
                const cover = media.find(i => i.isCover) || media[0];
                const card = document.createElement('div');
                card.className = "group cursor-pointer flex flex-col gap-3 relative";
                card.onclick = () => openInside(category);
                card.innerHTML = `
                    <div class="relative w-full aspect-[3/4] overflow-hidden shadow-xl border-4 border-white bg-white hover:border-black transition-colors duration-300">
                        ${cover && cover.type !== 'iframe' ? getThumbnailHtml(cover) : `<div class="w-full h-full bg-[#1a1a1a]"></div>`}
                        <div class="absolute inset-0 bg-black/30 group-hover:bg-black/10 transition-colors"></div>
                        <div class="absolute bottom-0 left-0 p-6 z-10 w-full dark-glass">
                            <h3 class="text-white text-3xl font-serif italic mb-2 leading-tight">${category}</h3>
                            <span class="text-white text-[10px] tracking-widest uppercase font-bold opacity-70">${media.length} Halaman</span>
                        </div>
                        <div class="absolute top-2 right-2 flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="openForm('editMagazine', '${category.replace(/'/g, "\\'")}'); event.stopPropagation();" class="bg-blue-600 text-white text-[9px] font-bold px-3 py-1 hover:bg-blue-700">EDIT</button>
                            <button onclick="deleteMagazine('${category.replace(/'/g, "\\'")}'); event.stopPropagation();" class="bg-red-600 text-white text-[9px] font-bold px-3 py-1 hover:bg-red-700">HAPUS</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function renderInsideMagazine(category) {
            const grid = document.getElementById('pageGrid'); grid.innerHTML = '';
            let items = getFilteredData().filter(i => i.category === category);
            const meta = items.find(i => i.type === 'meta');
            let media = items.filter(i => i.type !== 'meta');
            document.getElementById('insideTitle').innerText = category;
            document.getElementById('insideDesc').innerText = meta ? meta.notes : '';
            document.getElementById('insideCount').innerText = `${media.length} Halaman`;
            media.forEach(item => {
                const card = document.createElement('div');
                card.className = "relative aspect-square overflow-hidden shadow border border-gray-200 group bg-black";
                card.innerHTML = `
                    <div class="w-full h-full opacity-80 group-hover:opacity-100 flex items-center justify-center">${getThumbnailHtml(item)}</div>
                    <div class="absolute top-0 right-0 p-2 opacity-0 group-hover:opacity-100 bg-black/60 w-full flex justify-end gap-1">
                        <button onclick="openForm('edit', '${item.id}'); event.stopPropagation();" class="text-[9px] text-blue-400 font-bold px-1">EDIT</button>
                        <button onclick="deletePage('${item.id}'); event.stopPropagation();" class="text-[9px] text-red-400 font-bold px-1">HAPUS</button>
                        <button onclick="setCover('${item.id}', '${category.replace(/'/g, "\\'")}'); event.stopPropagation();" class="text-[9px] ${item.isCover ? 'text-green-400' : 'text-white'} font-bold px-1">${item.isCover ? '★' : 'COVER'}</button>
                    </div>
                    <div class="absolute bottom-0 w-full p-2 bg-gradient-to-t from-black to-transparent pointer-events-none">
                        <p class="text-white text-[10px] font-bold truncate">${item.tags && item.tags.toLowerCase().includes('nsfw') ? '🔞 ' : ''}${item.title || 'Lembaran'}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- READER UI AUTO-HIDE ---
        function resetReaderUI() {
            const uiB = document.getElementById('readerUI'); const uiT = document.getElementById('globalHeader');
            const bp = document.getElementById('btnPrevPage'); const bn = document.getElementById('btnNextPage');
            if (currentView !== 'reader') return;
            [uiB, uiT, bp, bn].forEach(el => { if(el) el.classList.remove('opacity-0', '-translate-y-full', 'translate-y-10', 'pointer-events-none'); });
            clearTimeout(readerUITimer);
            readerUITimer = setTimeout(() => {
                uiB.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                uiT.classList.add('opacity-0', '-translate-y-full', 'pointer-events-none');
                [bp, bn].forEach(el => { if(el) el.classList.add('opacity-0', 'pointer-events-none'); });
            }, 2500);
        }

        function prevPage() { const s = document.getElementById('readerContent'); s.scrollBy({ left: -window.innerWidth, behavior: 'smooth' }); resetReaderUI(); }
        function nextPage() { const s = document.getElementById('readerContent'); s.scrollBy({ left: window.innerWidth, behavior: 'smooth' }); resetReaderUI(); }
        document.addEventListener('keydown', (e) => { if(currentView === 'reader') { if(e.key==='ArrowLeft') prevPage(); if(e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); nextPage(); } } });

        function startReading() {
            if (!currentMagazine) return;
            const content = document.getElementById('readerContent');
            let mediaItems = getFilteredData().filter(i => i.category === currentMagazine && i.type !== 'meta');
            if (mediaItems.length === 0) return alert("Halaman kosong.");
            currentView = 'reader'; content.innerHTML = ''; activeHlsEngines.forEach(eng => eng.destroy()); activeHlsEngines = [];
            content.innerHTML += `<div class="snap-page bg-black flex flex-col items-center justify-center text-white p-8 relative shadow-2xl pointer-events-none"><h2 class="text-5xl md:text-8xl mb-4 uppercase magazine-title">${currentMagazine}</h2><p class="text-xl font-light tracking-widest uppercase mb-12">${mediaItems.length} HALAMAN</p><div class="animate-pulse border border-white rounded-full px-6 py-2 text-xs tracking-widest font-bold">GESER UNTUK MEMBACA</div></div>`;
            
            mediaItems.forEach((item, idx) => {
                let urls = item.urls && item.urls.length > 0 ? item.urls : (item.url ? [item.url] : []);
                let isReverse = ((idx + 1) % 2 === 0);
                let mediaHtml = '';
                if (urls.length === 0) mediaHtml = `<div class="w-full h-full bg-[#1a1a1a] flex flex-col items-center justify-center p-12 text-white border-r-4 border-[#0078D7]"><h2 class="text-3xl font-serif italic">${item.title || 'Artikel'}</h2></div>`;
                else {
                    let gC = urls.length === 2 ? 'grid-cols-1' : (urls.length >= 3 ? 'grid-cols-2' : 'grid-cols-1');
                    let gR = urls.length === 2 ? 'grid-rows-2' : (urls.length >= 3 ? 'grid-rows-2' : 'grid-rows-1');
                    mediaHtml = `<div class="w-full h-[40vh] md:h-full md:w-1/2 bg-[#111] grid ${gC} ${gR} gap-1 p-1 overflow-hidden">`;
                    urls.forEach(u => {
                        let ut = detectMediaType(u);
                        if (ut === 'image') mediaHtml += `<div class="relative w-full h-full bg-[#111] cursor-zoom-in group" onclick="openImageViewer('${u}')"><div class="absolute inset-0 ${urls.length === 1 ? 'bg-contain' : 'bg-cover'} bg-no-repeat bg-center" style="background-image: url('${u}')"></div></div>`;
                        else if (ut === 'video' || ut === 'hls') mediaHtml += `<div class="w-full h-full bg-black flex items-center justify-center"><video data-src="${u}" controls class="max-w-full max-h-full hls-video-dynamic"></video></div>`;
                        else if (ut === 'youtube') mediaHtml += `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${getYoutubeId(u)}" frameborder="0" allowfullscreen></iframe>`;
                        else mediaHtml += `<div class="w-full h-full bg-blue-900 flex items-center justify-center text-white">🌐</div>`;
                    });
                    mediaHtml += `</div>`;
                }
                let rb = (item.title || item.notes) ? '#fcfcfc' : getPastelColor(urls[0] || item.id);
                let rh = `<div>${(item.tags || '').split(',').filter(t=>t.trim() && t.trim().toLowerCase()!=='nsfw').map(t=> `<span class="text-[10px] tracking-widest text-gray-500 font-bold border border-gray-300 px-2 py-1 mr-2 inline-block">#${t.trim()}</span>`).join('')}</div>${item.title ? `<h3 class="text-3xl md:text-4xl font-bold my-4 magazine-title">${item.title}</h3>` : ''}${item.notes ? `<p class="text-sm md:text-base text-gray-700 text-justify">${item.notes.replace(/\n/g, '<br>')}</p>` : ''}${item.sourceUrl ? `<div class="mt-8 pt-6 border-t"><a href="${item.sourceUrl}" target="_blank" class="text-[#0078D7] text-[10px] font-bold">🔗 SUMBER ASLI</a></div>` : ''}`;
                content.innerHTML += `<div class="snap-page flex flex-col ${isReverse ? 'md:flex-row-reverse' : 'md:flex-row'} shadow-2xl overflow-hidden border-gray-200" style="background-color: ${rb};">${mediaHtml}<div class="w-full h-[60vh] md:h-full md:w-1/2 p-6 md:p-16 flex flex-col overflow-y-auto pb-32">${rh}</div></div>`;
            });
            document.getElementById('readerView').classList.remove('hidden'); document.body.style.overflow = 'hidden';
            document.querySelectorAll('.hls-video-dynamic').forEach(v=>{let s=v.getAttribute('data-src');if(Hls.isSupported()){let h=new Hls();h.loadSource(s);h.attachMedia(v);activeHlsEngines.push(h);}else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=s;}});
            resetReaderUI();
        }

        function closeReader() { currentView = 'inside'; clearTimeout(readerUITimer); document.getElementById('readerView').classList.add('hidden'); document.getElementById('readerContent').innerHTML = ''; document.body.style.overflow = 'auto'; openShelf(); }
        function closeToShelf() { closeReader(); openShelf(); }

        // --- FORM ---
        function openForm(mode, id = null) {
            currentFormMode = mode; document.getElementById('mediaForm').reset(); document.getElementById('nsfwCheckbox').checked = false; document.getElementById('editIdInput').value = '';
            const mf = document.getElementById('magazineFields'); const pf = document.getElementById('pageFields'); const st = document.getElementById('btnSubmitForm');
            if (mode === 'magazine' || mode === 'editMagazine') {
                mf.classList.remove('hidden'); pf.classList.add('hidden'); st.innerText = mode === 'magazine' ? "BUAT MAJALAH" : "SIMPAN PERUBAHAN";
                if(mode === 'editMagazine') {
                    const meta = magData.find(i => i.type === 'meta' && i.category === id);
                    if(meta) { document.getElementById('magNameInput').value = meta.category; document.getElementById('magDescInput').value = meta.notes || ''; document.getElementById('oldCategoryInput').value = meta.category; document.getElementById('nsfwCheckbox').checked = (meta.tags || '').includes('nsfw'); }
                }
            } else {
                pf.classList.remove('hidden'); mf.classList.add('hidden'); st.innerText = mode === 'edit' ? "SIMPAN PERUBAHAN" : "SIMPAN HALAMAN";
                if(mode === 'edit') {
                    const item = magData.find(i => i.id === id);
                    if(item) { document.getElementById('editIdInput').value = item.id; document.getElementById('urlInput').value = item.urls ? item.urls.join('\n') : (item.url || ''); document.getElementById('sourceUrlInput').value = item.sourceUrl || ''; document.getElementById('titleInput').value = item.title || ''; document.getElementById('notesInput').value = item.notes || ''; document.getElementById('tagsInput').value = (item.tags||'').replace(', nsfw','').replace('nsfw',''); document.getElementById('nsfwCheckbox').checked = (item.tags||'').includes('nsfw'); }
                }
            }
            document.getElementById('formModal').classList.remove('hidden');
        }
        window.openForm = openForm;
        function closeForm() { document.getElementById('formModal').classList.add('hidden'); }

        document.getElementById('mediaForm').addEventListener('submit', (e) => {
            e.preventDefault();
            let n = document.getElementById('magNameInput').value.trim();
            let tArr = document.getElementById('tagsInput').value.split(',').map(x=>x.trim()).filter(x=>x && x.toLowerCase()!=='nsfw');
            if(document.getElementById('nsfwCheckbox').checked) tArr.push('nsfw');
            let fT = tArr.join(', ');

            if (currentFormMode === 'magazine' || currentFormMode === 'editMagazine') {
                if(!n) return alert("Judul wajib!");
                if(currentFormMode === 'editMagazine') {
                    let old = document.getElementById('oldCategoryInput').value;
                    magData.forEach(i => { if(i.category === old) i.category = n; if(i.type==='meta' && i.category === n) { i.notes = document.getElementById('magDescInput').value; i.tags = fT; } });
                } else {
                    magData.push({ id: Date.now().toString(), type: 'meta', category: n, notes: document.getElementById('magDescInput').value, tags: fT, createdAt: new Date().toISOString() });
                }
                saveData(); closeForm(); openShelf();
            } else {
                let uRaw = document.getElementById('urlInput').value.trim();
                let uArr = uRaw.split('\n').map(x=>x.trim()).filter(x=>x);
                let notes = document.getElementById('notesInput').value.trim();
                let chunks = (notes.length > 1000) ? splitTextIntoChunks(notes, 1000) : [notes];
                let mChunks = []; if(uArr.length > 0) { for(let i=0; i<uArr.length; i+=4) mChunks.push(uArr.slice(i, i+4)); } else mChunks.push([]);
                let nP = Math.max(chunks.length, mChunks.length);
                let items = [];
                for(let j=0; j<nP; j++) {
                    let tit = document.getElementById('titleInput').value.trim();
                    items.push({ id: Date.now().toString()+"_"+j, url: (mChunks[j]||mChunks[0]||[])[0]||'', urls: (mChunks[j]||mChunks[0]||[]), sourceUrl: document.getElementById('sourceUrlInput').value.trim(), type: detectMediaType((mChunks[j]||mChunks[0]||[])[0]), category: currentMagazine, title: j>0 ? tit+" (Lanjutan)":tit, tags: fT, notes: chunks[j]||'', isCover: false, createdAt: new Date().toISOString() });
                }
                if(currentFormMode === 'edit') { let eid = document.getElementById('editIdInput').value; let idx = magData.findIndex(i=>i.id===eid); magData.splice(idx, 1, ...items); }
                else magData.unshift(...items);
                saveData(); closeForm();
            }
        });

        function detectMediaType(u) { if(!u) return 'text_only'; if(/\.(jpe?g|png|gif|webp)/i.test(u)) return 'image'; if(/\.(mp4|webm)/i.test(u)) return 'video'; if(/\.m3u8/i.test(u)) return 'hls'; if(/youtube\.com|youtu\.be/i.test(u)) return 'youtube'; return 'iframe'; }
        function getYoutubeId(u) { let m = u.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/); return m?m[1]:null; }
        function exportData() { if(magData.length===0) return; let b = new Blob([JSON.stringify(magData, null, 2)], {type:"application/json"}); let a = document.createElement("a"); a.href=URL.createObjectURL(b); a.download="Magazine_Data.json"; a.click(); }
        function importData(e) { let f=e.target.files[0]; if(!f) return; let r=new FileReader(); r.onload=(ev)=>{ try{ let d=JSON.parse(ev.target.result); if(Array.isArray(d)){ d.forEach(i=>{ if(i.type==='meta'){ if(!magData.some(x=>x.type==='meta'&&x.category===i.category)) magData.push(i); } else magData.unshift(i); }); saveData(); } }catch(err){}}; r.readAsText(f); }

        openShelf();
    </script>
</body>
</html>
