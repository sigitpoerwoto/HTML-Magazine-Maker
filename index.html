<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Magazine - English Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');
        
        body { font-family: 'Lato', sans-serif; background-color: #f8f9fa; color: #1a1a1a; margin: 0; overflow: hidden; }
        h1, h2, h3, .magazine-title { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; } 

        .dark-glass { background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%); }

        .btn-mag {
            border: 1px solid #1a1a1a; padding: 8px 16px; font-size: 12px; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; background: transparent;
        }
        .btn-mag:hover:not(:disabled) { background: #1a1a1a; color: white; }
        .btn-mag:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .search-bar { border: none; border-bottom: 2px solid #1a1a1a; background: transparent; font-family: 'Lato', sans-serif; outline: none; transition: border-color 0.3s; }
        .search-bar:focus { border-bottom: 2px solid #0078D7; }

        .reader-y { flex-direction: column; overflow-y: auto; overflow-x: hidden; scroll-snap-type: y mandatory; }
        .reader-y .snap-page { scroll-snap-align: start; width: 100vw; height: 100vh; flex-shrink: 0; }
        
        .reader-x { flex-direction: row; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; }
        .reader-x .snap-page { scroll-snap-align: center; width: 100vw; height: 100vh; flex-shrink: 0; }

        @media (min-width: 768px) {
            .reader-y .snap-page:nth-child(even) {
                flex-direction: row-reverse !important;
            }
        }
    </style>
</head>
<body>

    <header id="globalHeader" class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-white/95 backdrop-blur-md shadow-sm transition-all duration-500 ease-in-out transform">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-bold tracking-widest uppercase cursor-pointer" onclick="openShelf()">MAGAZINE.</h1>
            <div class="relative hidden md:block">
                <span class="absolute left-0 bottom-2 text-gray-500">🔍</span>
                <input type="text" id="searchInput" placeholder="Search pages..." class="search-bar pl-6 py-2 w-64 text-sm font-bold tracking-wide" oninput="renderViews()">
            </div>
        </div>
        
        <div class="flex gap-4 relative z-50">
            <button onclick="toggleSafeMode()" id="safeModeBtn" class="btn-mag text-[#107C10] bg-white flex items-center gap-2 border-gray-300 transition-colors hidden md:flex">
                <span id="safeModeIcon" class="text-lg leading-none">🛡️</span> 
                <span id="safeModeText" class="font-bold">SAFE: ON</span>
            </button>
            <button onclick="document.getElementById('importFile').click()" class="btn-mag bg-white font-bold hidden md:block">📥 RESTORE</button>
            <input type="file" id="importFile" accept=".json,.txt" class="hidden" onchange="importData(event)">
            <button onclick="exportData()" class="btn-mag bg-white font-bold hidden md:block">📦 BACKUP (.JSON)</button>
            <button onclick="openForm('magazine')" id="btnGlobalAdd" class="btn-mag bg-black text-white font-bold cursor-pointer">+ NEW MAGAZINE</button>
        </div>
    </header>

    <main id="shelfView" class="w-full h-screen overflow-y-auto pt-28 px-8 pb-12">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-4xl italic mb-12 text-center text-gray-800">Magazine Shelf</h2>
            <div id="magazineGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
        </div>
    </main>

    <main id="insideView" class="hidden w-full h-screen overflow-y-auto pt-28 px-8 pb-12 bg-gray-50">
        <div class="max-w-6xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 border-b-2 border-black pb-4 gap-4">
                <div>
                    <button onclick="openShelf()" class="text-sm font-bold text-gray-500 uppercase tracking-widest hover:text-black mb-2">← BACK TO SHELF</button>
                    <h2 id="insideTitle" class="text-5xl font-bold magazine-title text-gray-900 uppercase">Magazine Title</h2>
                    <p id="insideDesc" class="text-gray-600 mt-2 text-sm italic max-w-2xl"></p>
                    <p id="insideCount" class="text-gray-400 mt-2 tracking-widest text-xs font-bold uppercase">0 Pages</p>
                </div>
                <div class="flex flex-wrap gap-4 w-full md:w-auto">
                    <button onclick="downloadMagazineHTML()" id="btnDownloadHtml" class="btn-mag bg-[#0078D7] text-white font-bold border-none hover:bg-blue-800">🌐 DOWNLOAD HTML</button>
                    <button onclick="openForm('page')" class="btn-mag bg-white text-black font-bold border-gray-300">+ ADD PAGE</button>
                    <button onclick="startReading()" class="btn-mag bg-black text-white font-bold shadow-lg border-none px-6">📖 READ MAGAZINE</button>
                </div>
            </div>
            <div id="pageGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <div id="readerView" class="hidden fixed inset-0 z-40 bg-black">
        <div id="readerContent" class="reader-x w-full h-full flex scroll-smooth"></div>
        
        <button id="btnPrevPage" onclick="prevPage()" class="fixed left-6 top-1/2 -translate-y-1/2 z-50 bg-black/60 text-white w-14 h-14 rounded-full items-center justify-center hover:bg-black/90 transition-all duration-500 opacity-100 hidden md:flex text-2xl font-bold shadow-xl border border-gray-600">❮</button>
        <button id="btnNextPage" onclick="nextPage()" class="fixed right-6 top-1/2 -translate-y-1/2 z-50 bg-black/60 text-white w-14 h-14 rounded-full items-center justify-center hover:bg-black/90 transition-all duration-500 opacity-100 hidden md:flex text-2xl font-bold shadow-xl border border-gray-600">❯</button>

        <div id="readerUI" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-wrap justify-center gap-2 w-full px-4 transition-all duration-500 ease-in-out transform">
            <button onclick="toggleReaderMode()" id="btnReaderMode" class="btn-mag bg-black text-white font-bold shadow-2xl border border-gray-600 hover:scale-105">↕️ VERTICAL SCROLL</button>
            <button onclick="closeReader()" class="btn-mag bg-white text-black font-bold shadow-2xl border-none hover:scale-105">📂 PAGE LIST</button>
            <button onclick="closeToShelf()" class="btn-mag bg-[#D83B01] text-white font-bold shadow-2xl border-none hover:scale-105">🏠 MAGAZINE SHELF</button>
        </div>
    </div>

    <div id="imageViewer" class="hidden fixed inset-0 z-[200] bg-black/95 flex items-center justify-center overflow-hidden touch-none">
        <button onclick="closeImageViewer()" class="absolute top-6 right-6 text-white text-xl z-10 bg-black/50 hover:bg-red-600 w-12 h-12 rounded-full border border-gray-600 transition-colors">✕</button>
        <div class="absolute bottom-6 text-white/50 text-xs tracking-widest uppercase font-bold z-10 pointer-events-none">Scroll / Pinch to Zoom • Drag to Navigate</div>
        <img id="zoomImage" src="" class="max-w-full max-h-full object-contain transition-transform duration-100 ease-out" style="transform-origin: center; cursor: grab;">
    </div>

    <div id="formModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white border border-gray-300 shadow-2xl w-full max-w-3xl p-8 relative max-h-[95vh] overflow-y-auto">
            <button type="button" onclick="closeForm()" class="absolute top-4 right-4 text-gray-500 hover:text-black text-2xl font-light">✕</button>
            <h2 id="formTitle" class="text-3xl mb-6 magazine-title">Form</h2>
            
            <form id="mediaForm" class="space-y-4">
                <input type="hidden" id="editIdInput">
                <input type="hidden" id="oldCategoryInput">
                
                <div id="magazineFields" class="hidden space-y-4 border-b pb-6 border-gray-200">
                    <div>
                        <label class="text-xs tracking-widest text-gray-500 uppercase">Magazine Name</label>
                        <input type="text" id="magNameInput" placeholder="e.g., Design Inspiration 2026" class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent font-bold text-lg">
                    </div>
                    <div>
                        <label class="text-xs tracking-widest text-gray-500 uppercase">Description (Optional)</label>
                        <textarea id="magDescInput" rows="2" placeholder="Collection of ideas and visual references..." class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent resize-none"></textarea>
                    </div>
                </div>

                <div id="pageFields" class="hidden space-y-5 border-b pb-6 border-gray-200">
                    <div class="bg-gray-50 p-4 border border-gray-200 relative">
                        <label class="text-xs tracking-widest text-gray-800 font-bold uppercase block mb-2">1. Media / Collage Links</label>
                        <p class="text-[10px] text-gray-500 mb-2">Separate with "Enter". More than 4 links will auto-split into the next pages.</p>
                        <textarea id="urlInput" rows="3" placeholder="https://image-link-1.jpg&#10;https://video-link-2.mp4" class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent text-blue-600 resize-y"></textarea>
                    </div>
                    
                    <div class="bg-blue-50/50 p-4 border border-blue-100">
                        <label class="text-xs tracking-widest text-blue-800 font-bold uppercase block mb-2">2. Original Source Link (Optional)</label>
                        <p class="text-[10px] text-blue-600 mb-2">For reference only. Will appear as an "Open Original Source" button.</p>
                        <input type="text" id="sourceUrlInput" placeholder="https://news-source.com/article" class="w-full p-3 border-b-2 border-blue-200 focus:border-blue-600 outline-none bg-transparent">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs tracking-widest text-gray-500 uppercase">3. Headline (Title - Optional)</label>
                            <input type="text" id="titleInput" placeholder="Leave blank if you only want photos" class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent">
                        </div>
                        <div>
                            <label class="text-xs tracking-widest text-gray-500 uppercase">4. Article / Notes</label>
                            <textarea id="notesInput" rows="3" placeholder="Very long text will automatically split into multiple pages." class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent resize-none"></textarea>
                        </div>
                    </div>
                </div>

                <div class="pt-2">
                    <label class="text-xs tracking-widest text-gray-500 uppercase">Tags</label>
                    <input type="text" id="tagsInput" placeholder="news, ai, 2026..." class="w-full p-3 border-b-2 border-gray-300 focus:border-black outline-none bg-transparent text-sm">
                    
                    <label class="flex items-center gap-3 text-xs font-bold tracking-widest text-[#D83B01] p-4 border border-red-100 bg-red-50 cursor-pointer hover:border-[#D83B01] transition mt-4">
                        <input type="checkbox" id="nsfwCheckbox" class="w-5 h-5 accent-[#D83B01] cursor-pointer rounded-none">
                        MARK AS NSFW / PRIVATE
                    </label>
                </div>

                <button type="submit" id="btnSubmitForm" class="btn-mag bg-black text-white w-full mt-6 text-sm font-bold py-4 shadow-lg">SAVE PAGE</button>
            </form>
        </div>
    </div>

    <script>
        // INIT DATABASE & STATE
        let magData = [];
        try {
            const rawData = localStorage.getItem('magFlipData');
            if (rawData) {
                magData = JSON.parse(rawData);
                if (!Array.isArray(magData)) magData = [];
            }
        } catch (e) { magData = []; }
        
        let activeHlsEngines = [];
        let currentView = 'shelf'; 
        let currentMagazine = null; 
        let currentReaderDirection = 'x'; 
        let currentFormMode = 'magazine'; 
        
        let isSafeMode = true; 
        let readerUITimer = null;

        function saveData() { localStorage.setItem('magFlipData', JSON.stringify(magData)); renderViews(); }

        function getPastelColor(str) {
            let hash = 0; if (!str) str = "default";
            for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
            let r = (hash & 0xFF0000) >> 16; let g = (hash & 0x00FF00) >> 8; let b = hash & 0x0000FF;
            r = Math.floor((r + 255) / 2); g = Math.floor((g + 255) / 2); b = Math.floor((b + 255) / 2);
            return `rgb(${r}, ${g}, ${b})`;
        }

        // AUTO PAGINATION LOGIC
        function splitTextIntoChunks(text, maxLength) {
            if (!text) return [];
            let chunks = []; let paragraphs = text.split('\n'); let currentChunk = '';
            for (let p of paragraphs) {
                if (p.length > maxLength) {
                    let words = p.split(/\s+/);
                    for (let word of words) {
                        if ((currentChunk.length + word.length + 1) > maxLength && currentChunk.length > 0) {
                            chunks.push(currentChunk.trim()); currentChunk = word + ' ';
                        } else { currentChunk += word + ' '; }
                    }
                    currentChunk += '\n'; 
                } else {
                    if ((currentChunk.length + p.length + 1) > maxLength && currentChunk.length > 0) {
                        chunks.push(currentChunk.trim()); currentChunk = p + '\n';
                    } else { currentChunk += p + '\n'; }
                }
            }
            if (currentChunk.trim()) chunks.push(currentChunk.trim());
            return chunks;
        }

        // --- IMAGE ZOOM LOGIC ---
        const imgView = document.getElementById('imageViewer');
        const zoomImg = document.getElementById('zoomImage');
        let zScale = 1, zPanning = false, zPointX = 0, zPointY = 0, zStartX = 0, zStartY = 0;
        let initialPinchDistance = null, initialScale = 1;

        function openImageViewer(url) {
            zoomImg.src = url; zScale = 1; zPointX = 0; zPointY = 0;
            zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`;
            imgView.classList.remove('hidden');
        }
        function closeImageViewer() { imgView.classList.add('hidden'); zoomImg.src = ''; }

        zoomImg.onmousedown = function(e) { e.preventDefault(); zPanning = true; zStartX = e.clientX - zPointX; zStartY = e.clientY - zPointY; zoomImg.classList.replace('cursor-grab', 'cursor-grabbing'); }
        imgView.onmouseup = function() { zPanning = false; zoomImg.classList.replace('cursor-grabbing', 'cursor-grab'); }
        imgView.onmouseleave = function() { zPanning = false; zoomImg.classList.replace('cursor-grabbing', 'cursor-grab'); }
        imgView.onmousemove = function(e) { if(!zPanning) return; zPointX = e.clientX - zStartX; zPointY = e.clientY - zStartY; zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`; }

        imgView.onwheel = function(e) {
            e.preventDefault();
            let xs = (e.clientX - zPointX) / zScale; let ys = (e.clientY - zPointY) / zScale;
            let delta = (e.wheelDelta ? -e.wheelDelta : e.deltaY);
            (delta > 0) ? (zScale /= 1.2) : (zScale *= 1.2);
            zScale = Math.min(Math.max(1, zScale), 4); 
            zPointX = e.clientX - xs * zScale; zPointY = e.clientY - ys * zScale;
            if(zScale === 1) { zPointX = 0; zPointY = 0; } 
            zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`;
        }

        imgView.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) { initialPinchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); initialScale = zScale; } 
            else if (e.touches.length === 1) { zPanning = true; zStartX = e.touches[0].clientX - zPointX; zStartY = e.touches[0].clientY - zPointY; }
        });
        imgView.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) { e.preventDefault(); const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); zScale = Math.min(Math.max(1, initialScale * (currentDistance / initialPinchDistance)), 4); zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`; } 
            else if (e.touches.length === 1 && zPanning) { e.preventDefault(); zPointX = e.touches[0].clientX - zStartX; zPointY = e.touches[0].clientY - zStartY; zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`; }
        }, {passive: false});
        imgView.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) initialPinchDistance = null;
            if (e.touches.length === 0) { zPanning = false; if(zScale === 1) { zPointX = 0; zPointY = 0; zoomImg.style.transform = `translate(${zPointX}px, ${zPointY}px) scale(${zScale})`; } }
        });

        // --- HTML EXPORT ENGINE ---
        function downloadMagazineHTML() {
            if (!currentMagazine) return;
            const btn = document.getElementById('btnDownloadHtml');
            btn.innerText = "⏳ PROCESSING HTML..."; btn.disabled = true;

            let allItems = getFilteredData().filter(i => i.category === currentMagazine);
            const metaItem = allItems.find(i => i.type === 'meta');
            let mediaItems = allItems.filter(i => i.type !== 'meta');

            if (mediaItems.length === 0) {
                alert("No pages to export.");
                btn.innerText = "🌐 DOWNLOAD HTML"; btn.disabled = false;
                return;
            }

            let pagesHtml = '';
            let globalPageCount = 1; 

            mediaItems.forEach((item) => {
                let urlsToRender = item.urls && item.urls.length > 0 ? item.urls : (item.url ? [item.url] : []);
                
                let isReverse = (globalPageCount % 2 === 0); 
                let flexDirClass = isReverse ? 'md:flex-row-reverse' : 'md:flex-row';
                let borderDirClass = isReverse ? 'border-l-2' : 'border-r-2';

                let mediaHtml = '';
                if (urlsToRender.length === 0 && item.type === 'text_only') {
                    mediaHtml = `
                        <div class="w-full h-[30vh] md:h-full md:w-1/2 bg-[#1a1a1a] flex flex-col items-center justify-center p-12 text-center text-white border-b-4 md:border-b-0 ${isReverse ? 'md:border-l-4' : 'md:border-r-4'} border-[#0078D7]">
                            <span class="text-6xl mb-6">📰</span>
                            <h2 class="text-3xl font-serif italic leading-tight mb-4">${item.title || 'Featured Article'}</h2>
                            <div class="w-12 h-1 bg-white opacity-50 mb-4"></div>
                            <span class="text-xs tracking-widest uppercase font-bold opacity-70">Text Reading</span>
                        </div>`;
                } else {
                    let gridCols = 'grid-cols-1'; let gridRows = 'grid-rows-1'; let len = urlsToRender.length;
                    if (len === 2) { gridCols = 'grid-cols-1'; gridRows = 'grid-rows-2'; }
                    else if (len >= 3 && len <= 4) { gridCols = 'grid-cols-2'; gridRows = 'grid-rows-2'; }
                    else if (len >= 5 && len <= 6) { gridCols = 'grid-cols-2'; gridRows = 'grid-rows-3'; }
                    else if (len >= 7) { gridCols = 'grid-cols-2'; gridRows = 'grid-rows-4'; }

                    mediaHtml = `<div class="w-full h-[40vh] md:h-full md:w-1/2 bg-[#111] grid ${gridCols} ${gridRows} gap-1 p-1 overflow-hidden">`;
                    
                    urlsToRender.forEach(u => {
                        let uType = detectMediaType(u);
                        let bgClass = len === 1 ? 'bg-contain' : 'bg-cover';

                        if (uType === 'image') {
                            mediaHtml += `
                            <a href="${u}" target="_blank" class="relative w-full h-full bg-[#111] group overflow-hidden block">
                                <div class="absolute inset-0 ${bgClass} bg-no-repeat bg-center transition-transform duration-500 group-hover:scale-105" style="background-image: url('${u}')"></div>
                            </a>`;
                        } else if (uType === 'video') {
                            mediaHtml += `<div class="w-full h-full bg-black flex items-center justify-center"><video controls class="max-w-full max-h-full w-full h-full object-contain"><source src="${u}"></video></div>`;
                        } else if (uType === 'hls') {
                            mediaHtml += `<div class="w-full h-full bg-black flex items-center justify-center"><video data-src="${u}" controls class="max-w-full max-h-full w-full h-full object-contain hls-video-dynamic"></video></div>`;
                        } else if (uType === 'youtube') {
                            mediaHtml += `<div class="w-full h-full"><iframe class="w-full h-full" src="https://www.youtube.com/embed/${getYoutubeId(u)}" frameborder="0" allowfullscreen></iframe></div>`;
                        } else {
                            mediaHtml += `<div class="w-full h-full bg-blue-900 flex flex-col items-center justify-center p-4 text-center text-white"><span class="text-3xl mb-2">🌐</span><span class="text-[10px] font-bold">External Source</span></div>`;
                        }
                    });
                    mediaHtml += `</div>`;
                }

                let titleClean = item.title && item.title !== 'Tanpa Judul' ? item.title : '';
                let notesClean = item.notes || '';
                let isTextEmpty = !titleClean && !notesClean.trim();
                
                let rightPanelBg = '#fcfcfc';
                let rightPanelHtml = '';
                
                let tagsHtml = (item.tags || '').split(',').filter(t=>t.trim() && t.trim().toLowerCase()!=='nsfw').map(t=> `<span class="text-[10px] tracking-widest uppercase text-gray-500 font-bold border border-gray-300 px-2 py-1 mr-2 mb-2 inline-block">#${t.trim()}</span>`).join('');
                
                let sourceLinkHtml = item.sourceUrl ? `
                    <div class="mt-8 pt-6 border-t border-gray-200">
                        <a href="${item.sourceUrl}" target="_blank" class="inline-block border border-[#0078D7] text-[#0078D7] hover:bg-[#0078D7] hover:text-white px-4 py-2 text-[10px] font-bold tracking-widest uppercase transition">
                            🔗 OPEN ORIGINAL SOURCE
                        </a>
                    </div>` : '';

                if (isTextEmpty && !item.sourceUrl) {
                    let seed = (urlsToRender.length > 0) ? urlsToRender[0] : item.id;
                    rightPanelBg = getPastelColor(seed);
                } else {
                    rightPanelHtml = `
                        <div class="mb-4">${tagsHtml}</div>
                        ${titleClean ? `<h3 class="text-3xl md:text-4xl font-bold mb-4 magazine-title leading-tight">${titleClean}</h3><div class="w-16 h-1 bg-black mb-6 flex-shrink-0"></div>` : ''}
                        ${notesClean ? `<p class="text-sm md:text-base text-gray-700 leading-relaxed font-light text-justify" style="column-count: 1;">${notesClean.replace(/\n/g, '<br>')}</p>` : ''}
                        ${sourceLinkHtml}
                    `;
                }

                pagesHtml += `
                    <div class="snap-page flex flex-col ${flexDirClass} shadow-2xl overflow-hidden border-gray-200 ${borderDirClass}" style="background-color: ${rightPanelBg};">
                        ${mediaHtml}
                        <div class="w-full h-[60vh] md:h-full md:w-1/2 p-6 md:p-16 flex flex-col overflow-y-auto pb-32">
                            ${rightPanelHtml}
                        </div>
                    </div>
                `;
                globalPageCount++;
            });

            // Template HTML Standalone
            let htmlContent = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${currentMagazine} - Magazine Export</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"><\/script>
    <style>

                    rightPanelHtml = `
                        <div class="mb-4 pointer-events-none">${tagsHtml}</div>
                        ${titleClean ? `<h3 class="text-3xl md:text-4xl font-bold mb-4 magazine-title leading-tight pointer-events-none">${titleClean}</h3><div class="w-16 h-1 bg-black mb-6 flex-shrink-0 pointer-events-none"></div>` : ''}
                        ${notesClean ? `<p class="text-sm md:text-base text-gray-700 leading-relaxed font-light text-justify pointer-events-none" style="column-count: 1;">${notesClean.replace(/\n/g, '<br>')}</p>` : ''}
                        ${sourceLinkHtml}
                    `;
                }

                content.innerHTML += `
                    <div class="snap-page flex flex-col ${flexDirClass} shadow-2xl overflow-hidden border-gray-200 ${borderDirClass}" style="background-color: ${rightPanelBg};">
                        ${mediaHtml}
                        <div class="w-full h-[60vh] md:h-full md:w-1/2 p-6 md:p-16 flex flex-col overflow-y-auto pb-32" onmousedown="event.stopPropagation()">
                            ${rightPanelHtml}
                        </div>
                    </div>
                `;
                globalPageCount++;
            });

            document.getElementById('readerView').classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            const btn = document.getElementById('btnReaderMode');
            btn.innerText = currentReaderDirection === 'x' ? '↕️ VERTICAL SCROLL' : '↔️ HORIZONTAL FLIP';

            document.querySelectorAll('.hls-video-dynamic').forEach(videoEl => {
                let src = videoEl.getAttribute('data-src');
                if (Hls.isSupported()) { 
                    const hls = new Hls(); hls.loadSource(src); hls.attachMedia(videoEl); activeHlsEngines.push(hls); 
                } 
                else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) { videoEl.src = src; }
            });
            
            applyReaderDirection();
            resetReaderUI(); 
        }

        function toggleReaderMode() {
            currentReaderDirection = currentReaderDirection === 'x' ? 'y' : 'x';
            const btn = document.getElementById('btnReaderMode');
            btn.innerText = currentReaderDirection === 'x' ? '↕️ VERTICAL SCROLL' : '↔️ HORIZONTAL FLIP';
            applyReaderDirection();
        }

        function applyReaderDirection() {
            const content = document.getElementById('readerContent');
            if (currentReaderDirection === 'x') {
                content.classList.remove('reader-y'); content.classList.add('reader-x');
            } else {
                content.classList.remove('reader-x'); content.classList.add('reader-y');
            }
        }

        function closeReader() {
            currentView = 'inside'; 
            clearTimeout(readerUITimer); 
            
            const uiTop = document.getElementById('globalHeader');
            uiTop.classList.remove('opacity-0', '-translate-y-full', 'pointer-events-none');

            document.getElementById('readerView').classList.add('hidden'); 
            document.getElementById('readerContent').innerHTML = '';
            document.body.style.overflow = 'auto';
            activeHlsEngines.forEach(eng => eng.destroy()); activeHlsEngines = [];
        }

        function closeToShelf() { closeReader(); openShelf(); }

        function openForm(mode, editId = null) { 
            currentFormMode = mode;
            document.getElementById('mediaForm').reset();
            document.getElementById('nsfwCheckbox').checked = false;
            document.getElementById('editIdInput').value = '';

            const magFields = document.getElementById('magazineFields');
            const pageFields = document.getElementById('pageFields');
            const btnSubmit = document.getElementById('btnSubmitForm');
            
            if (mode === 'magazine') {
                document.getElementById('formTitle').innerText = "Create New Magazine";
                magFields.classList.remove('hidden');
                pageFields.classList.add('hidden');
                btnSubmit.innerText = "CREATE MAGAZINE"; 
            } 
            else if (mode === 'editMagazine') {
                document.getElementById('formTitle').innerText = `Edit Magazine`;
                magFields.classList.remove('hidden');
                pageFields.classList.add('hidden');
                
                const meta = magData.find(i => i.type === 'meta' && i.category === editId);
                if (meta) {
                    document.getElementById('magNameInput').value = meta.category;
                    document.getElementById('magDescInput').value = meta.notes || '';
                    document.getElementById('oldCategoryInput').value = meta.category;
                    document.getElementById('nsfwCheckbox').checked = (meta.tags || '').toLowerCase().includes('nsfw');
                }
                btnSubmit.innerText = "SAVE CHANGES";
            }
            else if (mode === 'edit') {
                document.getElementById('formTitle').innerText = `Edit Page`;
                magFields.classList.add('hidden');
                pageFields.classList.remove('hidden');
                
                const item = magData.find(i => i.id === editId);
                if (item) {
                    document.getElementById('editIdInput').value = item.id;
                    document.getElementById('urlInput').value = (item.urls && item.urls.length > 0) ? item.urls.join('\n') : (item.url || '');
                    document.getElementById('sourceUrlInput').value = item.sourceUrl || '';
                    document.getElementById('titleInput').value = item.title || '';
                    document.getElementById('notesInput').value = item.notes || '';
                    document.getElementById('tagsInput').value = (item.tags || '').split(',').map(t=>t.trim()).filter(t=>t.toLowerCase()!=='nsfw').join(', ');
                    document.getElementById('nsfwCheckbox').checked = (item.tags || '').toLowerCase().includes('nsfw');
                }
                btnSubmit.innerText = "SAVE CHANGES";
            }
            else {
                document.getElementById('formTitle').innerText = `Add Page`;
                magFields.classList.add('hidden');
                pageFields.classList.remove('hidden');
                btnSubmit.innerText = "SAVE PAGE";
            }
            document.getElementById('formModal').classList.remove('hidden'); 
        }
        
        window.openForm = openForm;

        function closeForm() { document.getElementById('formModal').classList.add('hidden'); }

        document.getElementById('mediaForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let tagsArray = document.getElementById('tagsInput').value.trim().split(',').map(t => t.trim()).filter(t => t && t.toLowerCase() !== 'nsfw');
            if (document.getElementById('nsfwCheckbox').checked) tagsArray.push('nsfw');
            let finalTags = tagsArray.join(', ');

            if (currentFormMode === 'magazine' || currentFormMode === 'editMagazine') {
                let magName = document.getElementById('magNameInput').value.trim();
                
                if(!magName) {
                    alert("Magazine name is required!");
                    return;
                }
                
                if (currentFormMode === 'editMagazine') {
                    let oldCategory = document.getElementById('oldCategoryInput').value;
                    magData.forEach(i => {
                        if (i.category === oldCategory) i.category = magName;
                        if (i.type === 'meta' && i.category === magName) {
                            i.notes = document.getElementById('magDescInput').value.trim();
                            i.tags = finalTags;
                        }
                    });
                } else {
                    let newMeta = {
                        id: Date.now().toString(), type: 'meta', category: magName,
                        notes: document.getElementById('magDescInput').value.trim(),
                        tags: finalTags,
                        createdAt: new Date().toISOString()
                    };
                    magData.push(newMeta);
                }
                
                saveData(); closeForm(); openShelf();
                
            } else {
                let rawInput = document.getElementById('urlInput').value.trim();
                let rawUrls = rawInput.split('\n').map(u => u.trim().replace(/\.gifv(\?.*)?$/i, '.mp4$1')).filter(u => u !== '');
                
                let sourceUrl = document.getElementById('sourceUrlInput').value.trim();
                let inputNotes = document.getElementById('notesInput').value.trim();
                let inputTitle = document.getElementById('titleInput').value.trim();

                if(rawUrls.length === 0 && !inputNotes && !sourceUrl){
                    alert("Please provide at least a Media Link OR an Article Note.");
                    return;
                }

                let textChunks = splitTextIntoChunks(inputNotes, 1000); 
                let mediaChunks = [];
                
                if (rawUrls.length === 0) {
                    mediaChunks.push([]);
                } else {
                    for (let i = 0; i < rawUrls.length; i += 4) {
                        mediaChunks.push(rawUrls.slice(i, i + 4));
                    }
                }

                let numPages = Math.max(textChunks.length, mediaChunks.length, 1);
                let generatedItems = [];

                for (let j = 0; j < numPages; j++) {
                    let chunkText = textChunks[j] || '';
                    let chunkUrls = mediaChunks[j] || mediaChunks[0] || [];
                    let primaryUrl = chunkUrls.length > 0 ? chunkUrls[0] : '';
                    
                    let chunkTitle = inputTitle;
                    if (inputTitle && j > 0) chunkTitle = `${inputTitle} (Continued ${j+1})`;

                    let newPage = {
                        id: Date.now().toString() + "_" + j, 
                        url: primaryUrl, 
                        urls: chunkUrls, 
                        sourceUrl: sourceUrl,
                        type: detectMediaType(primaryUrl),
                        category: currentMagazine,
                        title: chunkTitle, 
                        tags: finalTags,
                        notes: chunkText,
                        isCover: false, 
                        createdAt: new Date().toISOString()
                    };
                    generatedItems.push(newPage);
                }

                if (currentFormMode === 'edit') {
                    let editId = document.getElementById('editIdInput').value;
                    let itemIndex = magData.findIndex(i => i.id === editId);
                    if (itemIndex > -1) {
                        magData.splice(itemIndex, 1, ...generatedItems);
                    }
                } else {
                    magData.unshift(...generatedItems);
                }
                saveData(); closeForm();
            }
        });

        function exportData() {
            if (magData.length === 0) return alert("No data to backup.");
            const blob = new Blob([JSON.stringify(magData, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "Magazine_Backup.json";
            document.body.appendChild(a); a.click(); URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0]; 
            if (!file) return;

            // Peringatan jika pengguna salah upload file HTML
            if (file.name.endsWith('.html')) {
                alert("Please select the JSON backup file, not the Standalone HTML file.");
                document.getElementById('importFile').value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) { 
                        importedData.forEach(item => {
                            if (item.type === 'meta') {
                                let existingIndex = magData.findIndex(i => i.type === 'meta' && i.category === item.category);
                                if (existingIndex === -1) magData.push(item);
                            } else {
                                let exists = magData.find(i => i.id === item.id);
                                if (!exists) magData.unshift(item);
                            }
                        }); 
                        saveData(); 
                        alert(`Backup data restored successfully!`); 
                    } else {
                        alert("Invalid file format.");
                    }
                } catch (err) { alert("Invalid JSON file. Please ensure it is a valid backup file."); }
                document.getElementById('importFile').value = ''; 
            };
            reader.readAsText(file);
        }

        openShelf();
    </script>
</body>
